function App(){
  // Restore session from localStorage
  const stored=useMemo(()=>{try{const s=localStorage.getItem('laapoa_session');return s?JSON.parse(s):null;}catch(e){return null;}},[]);
  const[authToken,setAuthToken]=useState(stored?.token||null);const[user,setUser]=useState(stored?.user||null);const[backendUrl,setBackendUrl]=useState(stored?.url||API_URL);const[demoMode,setDemoMode]=useState(false);
  const[members,setMembers]=useState([]);const[groups,setGroups]=useState([]);const[search,setSearch]=useState("");const[filters,setFilters]=useState({});const[selected,setSelected]=useState(new Set());const[panel,setPanel]=useState(null);const[editMember,setEditMember]=useState(null);const[toast,setToast]=useState("");const[sortCol,setSortCol]=useState("name");const[sortDir,setSortDir]=useState(1);const[loading,setLoading]=useState(false);const[deleteConfirm,setDeleteConfirm]=useState(null);const[viewMember,setViewMember]=useState(null);const[mobileMenu,setMobileMenu]=useState(false);const[unreadCount,setUnreadCount]=useState(0);const[importAlerts,setImportAlerts]=useState(null);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const handleLogin=(token,userData,url)=>{setAuthToken(token);setUser(userData);setBackendUrl(url);setDemoMode(false);try{localStorage.setItem('laapoa_session',JSON.stringify({token,user:userData,url}));}catch(e){}loadData(url,token);};
  const handleDemo=()=>{setDemoMode(true);setUser({username:"demo",displayName:"Demo User",email:"demo@laapoa.com",role:"admin"});setMembers(DEMO_MEMBERS);setGroups(DEMO_SAVED_GROUPS);};
  const handleLogout=()=>{setAuthToken(null);setUser(null);setDemoMode(false);setMembers([]);setGroups([]);setSelected(new Set());setUnreadCount(0);try{localStorage.removeItem('laapoa_session');}catch(e){}};
  const loadData=async(url,token)=>{setLoading(true);const[mRes,gRes]=await Promise.all([apiGet(url,'getMembers',token),apiGet(url,'getGroups',token)]);if(mRes.error&&(mRes.code===401||mRes.error==='Unauthorized')){handleLogout();return;}if(mRes.ok)setMembers(mRes.members);else flash("Failed to load members: "+(mRes.error||"unknown"));if(gRes.ok)setGroups(gRes.groups);setLoading(false);loadUnread(url,token);};
  const loadUnread=async(url,token)=>{const res=await apiGet(url,'getChangeLog',token);if(res.ok){const ct=(res.changes||[]).filter(c=>c.read!=='true').length;setUnreadCount(ct);}};
  // Auto-load data on restore
  useEffect(()=>{if(stored?.token&&stored?.url){loadData(stored.url,stored.token);}},[]);

  if(!user)return<LoginScreen onLogin={handleLogin} onDemo={handleDemo}/>;

  const afc=Object.values(filters).filter(v=>v.length>0).length;
  const filtered=members.filter(m=>{if(search){const s=search.toLowerCase();if(!Object.values(m).some(v=>String(v).toLowerCase().includes(s)))return false;}for(const[k,vs]of Object.entries(filters)){if(vs.length>0&&!vs.includes(m[k]))return false;}return true;});
  const sorted=[...filtered].sort((a,b)=>{const va=(a[sortCol]||"").toString().toLowerCase(),vb=(b[sortCol]||"").toString().toLowerCase();return va<vb?-sortDir:va>vb?sortDir:0;});
  const toggleSort=c=>{sortCol===c?setSortDir(d=>-d):(setSortCol(c),setSortDir(1));};
  const toggleSelect=id=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const selectAll=()=>{selected.size===sorted.length?setSelected(new Set()):setSelected(new Set(sorted.map(m=>m.id)));};

  const handleSave=async(data)=>{if(demoMode){if(editMember){setMembers(ms=>ms.map(m=>m.id===editMember.id?{...data,id:m.id}:m));flash("Member updated");}else{setMembers(ms=>[...ms,{...data,id:Date.now().toString()}]);flash("Member added");}}else{const res=await api(backendUrl,'saveMember',{token:authToken,member:editMember?{...data,id:editMember.id}:data});if(res.ok){flash("Member "+res.action);loadData(backendUrl,authToken);}else flash("Error: "+(res.error||"save failed"));}setPanel(null);setEditMember(null);};
  const handleDelete=async(id)=>{if(demoMode){setMembers(ms=>ms.filter(m=>m.id!==id));}else{const res=await api(backendUrl,'deleteMember',{token:authToken,id});if(res.ok)loadData(backendUrl,authToken);else{flash("Error: "+(res.error||"delete failed"));setDeleteConfirm(null);return;}}setSelected(s=>{const n=new Set(s);n.delete(id);return n;});flash("Member removed");setDeleteConfirm(null);};
  const handleSendEmail=async({subject,body,recipients})=>{if(demoMode){flash(`[Demo] Email queued to ${recipients.length} recipient(s)`);setPanel(null);return;}setLoading(true);const res=await api(backendUrl,'sendEmail',{token:authToken,recipients:recipients.map(r=>({email:r.email,name:r.name,rank:r.rank})),subject,body});setLoading(false);if(res.ok){flash(`Sent ${res.sent}/${res.total} emails`+(res.errors?.length?` (${res.errors.length} failed)`:''));}else{flash("Error: "+(res.error||"send failed"));}setPanel(null);};
  const handleSaveGroups=async(newGroups)=>{setGroups(newGroups);if(!demoMode){await api(backendUrl,'saveGroups',{token:authToken,groups:newGroups});}};

  const handleImport=async(newMembers)=>{
    if(demoMode){setMembers(ms=>[...ms,...newMembers]);flash(`Imported ${newMembers.length} members`);setPanel(null);return;}
    setLoading(true);
    const res=await api(backendUrl,'importMembers',{token:authToken,members:newMembers});
    await loadData(backendUrl,authToken);setLoading(false);
    if(res.ok){
      flash(`Imported: ${res.imported} new, ${res.skipped} skipped`);
      if(res.missing&&res.missing.length>0){setImportAlerts(res.missing);}
      else{setPanel(null);}
    }else{flash("Error: "+(res.error||"import failed"));setPanel(null);}
  };
  const stats={total:members.length,active:members.filter(m=>m.memberStatus==="Active").length,retired:members.filter(m=>m.memberStatus==="Retired").length};
  const COLS=[{key:"name",label:"Name"},{key:"serialNumber",label:"Serial #"},{key:"cid",label:"CID"},{key:"rank",label:"Rank"},{key:"mou",label:"MOU"},{key:"assignment",label:"Assignment"},{key:"memberStatus",label:"Status"},{key:"email",label:"Email"}];
  const activePills=Object.entries(filters).flatMap(([k,vs])=>vs.map(v=>({key:k,value:v,label:(FIELDS.find(f=>f.key===k)||{}).label||k})));

  return(<div className="app">
    <div className={`mob-overlay ${mobileMenu?"show":""}`} onClick={()=>setMobileMenu(false)}/>
    <div className={`sidebar ${mobileMenu?"open":""}`}>
      <div className="sidebar-brand"><div className="badge">LA</div><div><h1>LAAPOA</h1><span>Member Management</span></div></div>
      <div className="sidebar-nav">
        <div className="nav-section">Content</div>
        <button className="nav-item" onClick={()=>{setPanel("announcements");setMobileMenu(false);}}>{IC.edit} Announcements</button>
        <button className="nav-item" onClick={()=>{setPanel("events");setMobileMenu(false);}}>{IC.calendar} Events / Giveaways</button>
        <button className="nav-item" onClick={()=>{setPanel("votes");setMobileMenu(false);}}>{IC.check} Decide / Voting</button>
        <button className="nav-item" onClick={()=>{setPanel("bulletinboard");setMobileMenu(false);}}>{IC.edit} Bulletin Board</button>
        <div className="nav-section">Members</div>
        <button className="nav-item active" onClick={()=>setMobileMenu(false)}>{IC.users} Members</button>
        <button className="nav-item" onClick={()=>{setPanel("import");setMobileMenu(false);}}>{IC.upload} Import CSV</button>
        <button className="nav-item" onClick={()=>{setPanel("email");setMobileMenu(false);}}>{IC.mail} Compose Email</button>
        <button className="nav-item" onClick={()=>{setPanel("notifications");setMobileMenu(false);}}>{IC.bell} Notifications {unreadCount>0&&<span className="notif-badge">{unreadCount}</span>}</button>
        <div className="nav-section">Groups</div>
        {groups.map(g=><button key={g.id} className="nav-item" onClick={()=>{setFilters(g.filters);setPanel(null);setMobileMenu(false);}}><span className="dot" style={{background:g.color}}/>{g.name}<span className="cnt">{resolveGroup(g,members).length}</span></button>)}
        <button className="nav-item" onClick={()=>{setPanel("groups");setMobileMenu(false);}}>{IC.plus} Manage Groups</button>
        {!demoMode&&<><div className="nav-section">System</div><button className="nav-item" onClick={()=>{setPanel("config");setMobileMenu(false);}}>{IC.settings} Configuration</button></>}
      </div>
      <div className="sidebar-stats"><div className="stat-row"><span className="lb">Total</span><span className="vl">{stats.total}</span></div><div className="stat-row"><span className="lb">Active</span><span className="vl">{stats.active}</span></div><div className="stat-row"><span className="lb">Retired</span><span className="vl">{stats.retired}</span></div></div>
      <div className="user-bar"><span className="uname">{user.displayName}</span>{demoMode&&<span style={{fontSize:10,background:"var(--gold-dim)",padding:"2px 6px",borderRadius:8,color:"var(--gold)"}}>DEMO</span>}<button className="logout" onClick={handleLogout}>Sign out</button></div>
    </div>
    <div className="main">
      <div className="toolbar">
        <button className="hamburger" onClick={()=>setMobileMenu(true)}>{IC.menu}</button>
        <div className="search-box">{IC.search}<input placeholder="Search members..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <button className="btn" onClick={()=>setPanel("filter")}>{IC.filter} Filters {afc>0&&<span style={{color:"var(--gold)"}}>({afc})</span>}</button>
        {activePills.length>0&&<div className="pills">{activePills.map(p=><span className="pill" key={p.key+p.value}>{p.label}: {p.value}<button onClick={()=>setFilters(f=>({...f,[p.key]:(f[p.key]||[]).filter(v=>v!==p.value)}))}>{IC.xsm}</button></span>)}<button className="btn btn-sm" onClick={()=>setFilters({})}>Clear</button></div>}
        <div style={{flex:1}}/>
        {selected.size>0&&<button className="btn btn-outline-gold" onClick={()=>setPanel("email")}>{IC.mail} Email {selected.size} Selected</button>}
        <button className="btn btn-gold" onClick={()=>{setEditMember(null);setPanel("add");}}>{IC.plus} Add Member</button>
      </div>
      {selected.size>0&&<div className="sbar"><span className="sc">{selected.size}</span> member{selected.size!==1?"s":""} selected<button className="btn btn-sm" onClick={()=>setSelected(new Set())} style={{marginLeft:8}}>Clear</button><button className="btn btn-sm" onClick={selectAll}>Select All Visible ({sorted.length})</button></div>}
      <div className="table-wrap">
        {loading?<div className="empty"><p>Loading...</p></div>:
        sorted.length===0?<div className="empty">{IC.users}<p>No members match your criteria</p><button className="btn" onClick={()=>{setSearch("");setFilters({});}}>Clear Filters</button></div>:
        <table><thead><tr>
          <th style={{width:40}}><div className={`chk ${selected.size===sorted.length&&sorted.length>0?"on":""}`} onClick={selectAll}>{selected.size===sorted.length&&sorted.length>0&&IC.check}</div></th>
          {COLS.map(c=><th key={c.key} onClick={()=>toggleSort(c.key)}>{c.label} {sortCol===c.key&&(sortDir===1?"↑":"↓")}</th>)}
          <th style={{width:80}}>Actions</th>
        </tr></thead><tbody>
          {sorted.map(m=><tr key={m.id}>
            <td><div className={`chk ${selected.has(m.id)?"on":""}`} onClick={()=>toggleSelect(m.id)}>{selected.has(m.id)&&IC.check}</div></td>
            <td style={{fontWeight:600,cursor:"pointer",color:"var(--gold-light)"}} onClick={()=>setViewMember(m)}>{m.name}</td>
            <td><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{m.serialNumber}</span></td>
            <td><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{m.cid}</span></td>
            <td>{m.rank}</td>
            <td><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>{m.mou}</span></td>
            <td>{m.assignment||<span style={{color:"var(--text-muted)"}}>—</span>}</td>
            <td><span className={`badge-s s-${m.memberStatus}`}>{m.memberStatus}</span></td>
            <td style={{fontSize:12,color:"var(--text-dim)"}}>{m.email}</td>
            <td><div className="racts"><button onClick={()=>{setEditMember(m);setPanel("edit");}}>{IC.edit}</button><button className="del" onClick={()=>setDeleteConfirm(m)}>{IC.trash}</button></div></td>
          </tr>)}
        </tbody></table>}
      </div>
    </div>
    {(panel==="add"||panel==="edit")&&<MemberForm member={panel==="edit"?editMember:null} title={panel==="edit"?"Edit Member":"Add New Member"} onSave={handleSave} onClose={()=>{setPanel(null);setEditMember(null);}}/>}
    {panel==="email"&&<EmailComposer members={members} groups={groups} selectedIds={selected} onClose={()=>setPanel(null)} onSend={handleSendEmail} user={user}/>}
    {panel==="filter"&&<FilterPanel filters={filters} setFilters={setFilters} onClose={()=>setPanel(null)}/>}
    {panel==="groups"&&<GroupManager groups={groups} setGroups={g=>handleSaveGroups(g)} members={members} filters={filters} onClose={()=>setPanel(null)}/>}
    {panel==="config"&&<ConfigPanel scriptUrl={backendUrl} setScriptUrl={setBackendUrl} onClose={()=>setPanel(null)}/>}
    {panel==="import"&&<ImportPanel onClose={()=>setPanel(null)} onImport={handleImport} existingMembers={members}/>}
    {panel==="notifications"&&<NotificationPanel onClose={()=>{setPanel(null);loadUnread(backendUrl,authToken);}} backendUrl={backendUrl} authToken={authToken} flash={flash}/>}
    {panel==="announcements"&&<AnnouncementsPanel onClose={()=>setPanel(null)} backendUrl={backendUrl} authToken={authToken} flash={flash}/>}
    {panel==="events"&&<EventsPanel onClose={()=>setPanel(null)} backendUrl={backendUrl} authToken={authToken} flash={flash}/>}
    {panel==="votes"&&<VotesPanel onClose={()=>setPanel(null)} backendUrl={backendUrl} authToken={authToken} flash={flash}/>}
    {panel==="bulletinboard"&&<BulletinBoardPanel onClose={()=>setPanel(null)} backendUrl={backendUrl} authToken={authToken} flash={flash}/>}
    {importAlerts&&<MissingMembersModal missing={importAlerts} onClose={()=>{setImportAlerts(null);setPanel(null);}} backendUrl={backendUrl} authToken={authToken} flash={flash} onRefresh={()=>loadData(backendUrl,authToken)}/>}
    {viewMember&&<ContactCard member={viewMember} onClose={()=>setViewMember(null)} onEdit={(m)=>{setViewMember(null);setEditMember(m);setPanel("edit");}}/>}
    {deleteConfirm&&<div className="confirm-overlay" onClick={()=>setDeleteConfirm(null)}><div className="confirm-box" onClick={e=>e.stopPropagation()}>
      <h3>Delete Member</h3>
      <p>Are you sure you want to permanently remove <span className="cname">{deleteConfirm.name}</span>?</p>
      <p style={{fontSize:12}}>CID: {deleteConfirm.cid||"N/A"} · {deleteConfirm.rank} · {deleteConfirm.mou}</p>
      <div className="cactions"><button className="btn" onClick={()=>setDeleteConfirm(null)}>Cancel</button><button className="btn btn-red" onClick={()=>handleDelete(deleteConfirm.id)}>{IC.trash} Delete</button></div>
    </div></div>}
    <Toast msg={toast}/>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
