<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LAAPOA">
<meta name="theme-color" content="#0B1A33">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>LAAPOA Member Info</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1A33;--gold:#C6973F;--gold-light:#D4AD5E;--gold-dim:rgba(198,151,63,.15);--red:#C0392B;--red-dim:rgba(192,57,43,.12);--green:#27AE60;--green-dim:rgba(39,174,96,.12);--text:#E8E8EC;--text-dim:#8A8FA0;--text-muted:#5A6070;--surface:#0F1F38;--surface-raised:#152A4A;--border:rgba(198,151,63,.12);--border-bright:rgba(198,151,63,.3);--radius:8px;--radius-lg:12px;--shadow:0 4px 24px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;min-height:100dvh;display:flex;align-items:flex-start;justify-content:center;padding:0}
.container{width:100%;max-width:520px;min-height:100vh;min-height:100dvh}
.card{background:var(--surface);border:1px solid var(--border);border-radius:0;padding:32px 24px;box-shadow:none;margin-bottom:0;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
@media(min-width:540px){
  body{align-items:center;padding:20px}
  .container{min-height:auto}
  .card{border-radius:var(--radius-lg);box-shadow:var(--shadow);min-height:auto;margin-bottom:16px}
}
.brand{text-align:center;margin-bottom:24px}
.brand .badge{width:125px;height:125px;margin:0 auto 12px;display:block;background:none}
.brand h1{font-size:20px;font-weight:700}
.brand p{font-size:13px;color:var(--text-dim);margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
.field input,.field select{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field input[readonly]{opacity:.6;cursor:default}
.field select{cursor:pointer}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row.tri{grid-template-columns:2fr 1fr 1fr}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:14px;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;min-height:48px}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:var(--gold-light)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--border-bright)}
.err{background:var(--red-dim);color:var(--red);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px}
.ok{background:var(--green-dim);color:var(--green);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px}
.warn{background:rgba(230,126,34,.12);color:#E67E22;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;line-height:1.5}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-title:first-child{margin-top:0}
.member-header{display:flex;gap:14px;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--navy);flex-shrink:0}
.member-name{font-size:18px;font-weight:700}
.member-detail{font-size:13px;color:var(--text-dim);margin-top:2px}
.footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-muted);padding:8px}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 0;font-size:14px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text-dim);min-width:90px;font-size:13px}
.info-val{color:var(--text)}
.info-val a{color:var(--gold);text-decoration:none}
.info-val a:hover{text-decoration:underline}
.tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-dim);background:var(--navy);transition:all .15s;border:none;font-family:inherit;min-height:44px}
.tab:hover{color:var(--text)}
.tab.on{background:var(--gold-dim);color:var(--gold)}
.tab{position:relative}
.ann-badge{position:absolute;top:-4px;right:-4px;background:#C0392B;color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;line-height:1}
@media(max-width:480px){.field-row{grid-template-columns:1fr}.field-row.tri{grid-template-columns:1fr}}
.search-input{display:flex;gap:8px;margin-bottom:16px}
.search-input input{flex:1;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none}
.search-input input:focus{border-color:var(--gold)}
.search-input input::placeholder{color:var(--text-muted)}
.sr-card{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.sr-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--navy);flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-weight:600;font-size:14px}
.sr-detail{font-size:12px;color:var(--text-dim);margin-top:2px}
.sr-phone{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold-light);margin-top:4px}
.sr-phone a{color:var(--gold-light);text-decoration:none}
.sr-phone a:hover{text-decoration:underline}
.sr-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.sr-btn{padding:6px 12px;border-radius:var(--radius);font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface-raised);color:var(--text);font-family:inherit;white-space:nowrap;min-height:32px;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.sr-btn:hover{border-color:var(--border-bright);background:var(--gold-dim);color:var(--gold)}
.sr-btn.saved{background:var(--green-dim);border-color:transparent;color:var(--green)}
.search-empty{text-align:center;padding:30px 20px;color:var(--text-muted);font-size:14px}
.search-loading{text-align:center;padding:30px 0}
.search-loading .sl-text{font-size:15px;color:var(--text);font-weight:500;margin-bottom:14px}
.search-loading .sl-dots{display:inline-flex;gap:6px}
.search-loading .sl-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:slwave 1.2s ease-in-out infinite}
.search-loading .sl-dot:nth-child(2){animation-delay:.15s}
.search-loading .sl-dot:nth-child(3){animation-delay:.3s}
.search-loading .sl-dot:nth-child(4){animation-delay:.45s}
.search-loading .sl-dot:nth-child(5){animation-delay:.6s}
@keyframes slwave{0%,100%{transform:translateY(0);opacity:.3}50%{transform:translateY(-12px);opacity:1}}
.tabs{display:flex;flex-wrap:wrap;gap:0;margin-bottom:16px}
.tab{font-size:12px;padding:8px 10px;flex:1;min-width:0}
.bb-post{background:var(--navy);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.bb-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.bb-serial{font-family:'JetBrains Mono',monospace}
.bb-title{font-size:15px;font-weight:600;margin-bottom:6px}
.bb-body{font-size:13px;color:var(--text-dim);line-height:1.6;white-space:pre-wrap}
.bb-delete{font-size:11px;color:var(--red);cursor:pointer;padding:4px 8px;border:1px solid var(--red);border-radius:6px;background:none;font-family:inherit}
.bb-edit{font-size:11px;color:var(--gold);cursor:pointer;padding:4px 8px;border:1px solid var(--gold);border-radius:6px;background:none;font-family:inherit}
.bb-dots{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:4px 8px;line-height:1;position:absolute;top:8px;right:8px}
.bb-menu{position:absolute;top:32px;right:8px;background:var(--surface-raised);border:1px solid var(--border-bright);border-radius:8px;padding:4px;z-index:10;display:flex;flex-direction:column;gap:2px;min-width:100px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.bb-menu button{background:none;border:none;color:var(--text);font-size:13px;padding:8px 12px;text-align:left;cursor:pointer;font-family:inherit;border-radius:4px}
.bb-menu button:hover{background:var(--gold-dim)}
.bb-menu .bb-menu-del{color:var(--red)}
.bb-menu .bb-menu-del:hover{background:var(--red-dim)}
.bb-deleted{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;opacity:.5}
.bb-deleted-title{font-size:13px;color:var(--text-muted);text-decoration:line-through}
.bb-deleted-info{font-size:11px;color:var(--red);margin-top:4px}
.slide-confirm{position:relative;height:44px;background:var(--red-dim);border-radius:8px;overflow:hidden;margin-top:10px;touch-action:none}
.slide-track{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--red);pointer-events:none}
.slide-thumb{position:absolute;left:0;top:0;height:100%;width:50px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none}
.slide-thumb svg{width:20px;height:20px}
.slide-done{text-align:center;font-size:12px;color:var(--red);padding:10px}
.update-overlay{position:fixed;inset:0;background:rgba(11,26,51,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.update-text{font-size:16px;font-weight:600;color:var(--gold);margin-bottom:16px;letter-spacing:1px}
.update-wave span{display:inline-block;width:8px;height:8px;margin:0 3px;border-radius:50%;background:var(--gold);animation:updateWave 1.2s ease-in-out infinite}
.update-wave span:nth-child(2){animation-delay:.15s}
.update-wave span:nth-child(3){animation-delay:.3s}
.update-wave span:nth-child(4){animation-delay:.45s}
@keyframes updateWave{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-10px);opacity:1}}
.update-bar{width:200px;height:4px;background:rgba(198,151,63,.15);border-radius:2px;overflow:hidden;margin-top:16px}
.update-bar-inner{width:60%;height:100%;background:var(--gold);border-radius:2px;animation:updateFill 2s ease-in-out infinite}
@keyframes updateFill{0%{width:5%}50%{width:80%}100%{width:5%}}
.bb-compose{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;padding:16px;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius)}
.bb-compose input,.bb-compose textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;-webkit-appearance:none}
.bb-compose input:focus,.bb-compose textarea:focus{border-color:var(--gold)}
.bb-compose textarea{resize:vertical;min-height:80px}
.bb-rte-toolbar{display:flex;flex-wrap:wrap;gap:2px;padding:6px;background:var(--navy);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0}
.bb-rte-toolbar button{background:none;border:1px solid transparent;border-radius:4px;color:var(--text-dim);cursor:pointer;padding:4px 7px;font-size:12px;font-family:inherit;line-height:1;min-width:28px;text-align:center}
.bb-rte-toolbar button:hover{background:var(--surface-raised);color:var(--text);border-color:var(--border)}
.bb-rte-toolbar button.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}
.bb-rte-toolbar select{background:var(--navy);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;padding:3px 4px;font-size:11px;font-family:inherit}
.bb-rte-body{background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:12px;color:var(--text);font-size:14px;font-family:inherit;min-height:100px;max-height:250px;overflow-y:auto;outline:none;line-height:1.6}
.bb-rte-body:focus{border-color:var(--gold)}
.bb-rte-body a{color:var(--gold-light);text-decoration:underline}
.bb-rte-body h2{font-size:18px;margin:8px 0 4px}
.bb-rte-body h3{font-size:16px;margin:6px 0 4px}
.bb-rte-body ul,.bb-rte-body ol{padding-left:20px;margin:4px 0}
.bb-rte-body blockquote{border-left:3px solid var(--gold);padding-left:12px;margin:4px 0;color:var(--text-dim)}
.bb-rte-body:empty:before{content:attr(data-placeholder);color:var(--text-muted);pointer-events:none}
.ann-post{background:var(--navy);border:1px solid var(--border-bright);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.ann-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.ann-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--gold)}
.ann-body{font-size:13px;color:var(--text-dim);line-height:1.6}
.ann-body a{color:var(--gold-light);text-decoration:underline}
.ann-body h2{font-size:18px;margin:8px 0 4px;color:var(--text)}
.ann-body h3{font-size:16px;margin:6px 0 4px;color:var(--text)}
.ann-body ul,.ann-body ol{padding-left:20px;margin:4px 0}
.bday-section{background:linear-gradient(135deg,#1a1040,#0F1F38);border:1px solid rgba(198,151,63,.3);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;position:relative;overflow:hidden;text-align:center}
.bday-title{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px;position:relative;z-index:1}
.bday-subtitle{font-size:12px;color:var(--text-dim);margin-bottom:14px;position:relative;z-index:1}
.bday-name{font-size:16px;font-weight:600;color:var(--text);margin:8px 0;position:relative;z-index:1}
.bday-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}
.bb-tab-label{display:inline}
.sr-card{cursor:pointer}
.sr-card:active{background:var(--surface-raised)}
.contact-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.contact-full{background:var(--surface);border:1px solid var(--border-bright);border-radius:20px;width:100%;max-width:360px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.6)}
.cf-header{padding:32px 28px 24px;text-align:center;border-bottom:1px solid var(--border)}
.cf-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--navy);margin:0 auto 16px}
.cf-name{font-size:22px;font-weight:700}
.cf-detail{font-size:18px;color:var(--text-dim);margin-top:6px;line-height:1.4}
.cf-serial{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--text-muted);margin-top:6px}
.cf-body{padding:24px 28px}
.cf-section{margin-bottom:18px}
.cf-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:12px}
.cf-phone{padding:14px 0;border-bottom:1px solid var(--border)}
.cf-phone:last-child{border-bottom:none}
.cf-phone-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px}
.cf-phone-num{font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--gold-light)}
.cf-phone-num a{color:var(--gold-light);text-decoration:none;border-bottom:1px dashed var(--border-bright);padding-bottom:2px}
.cf-phone-num a:active{color:var(--gold)}
.cf-phone-hint{font-size:10px;color:var(--text-muted);margin-top:4px}
.cf-actions{padding:16px 28px 24px;display:flex;flex-direction:column;gap:10px}
.cf-btn{padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;text-align:center;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px}
.cf-btn-add{background:var(--gold);color:var(--navy)}
</style>

<body>
<div class="container" id="app"></div>

<script>
const API_URL = 'https://laapoa-api.mike-a78.workers.dev/';
const BLOCKED = ['@lawa.org','@lacity.org','@lacity.com','@lapd.online'];

const RANK_OPTIONS = [
  {group:'Officers — MOU 30',items:[{label:'Specialist (MOU 30)',rank:'Specialist',mou:'MOU 30',dept:'Airport Police'},{label:'Officer PI (MOU 30)',rank:'Officer PI',mou:'MOU 30',dept:'Airport Police'},{label:'Officer PII (MOU 30)',rank:'Officer PII',mou:'MOU 30',dept:'Airport Police'},{label:'Officer PIII (MOU 30)',rank:'Officer PIII',mou:'MOU 30',dept:'Airport Police'}]},
  {group:'Officers — MOU 28',items:[{label:'Officer PII (MOU 28)',rank:'Officer PII',mou:'MOU 28',dept:'LAPD'},{label:'Officer PIII (MOU 28)',rank:'Officer PIII',mou:'MOU 28',dept:'LAPD'}]},
  {group:'Supervisors — MOU 39',items:[{label:'Sergeant (MOU 39)',rank:'Sergeant',mou:'MOU 39',dept:'Airport Police'},{label:'Lieutenant (MOU 39)',rank:'Lieutenant',mou:'MOU 39',dept:'Airport Police'}]},
  {group:'Supervisor — MOU 28',items:[{label:'Sergeant (MOU 28)',rank:'Sergeant',mou:'MOU 28',dept:'LAPD'}]},
  {group:'Park Rangers — MOU 65',items:[{label:'Park Ranger (MOU 65)',rank:'Park Ranger',mou:'MOU 65',dept:'Park Rangers'},{label:'Park Ranger Supervisor (MOU 65)',rank:'Park Ranger Supervisor',mou:'MOU 65',dept:'Park Rangers'},{label:'Commanding Park Ranger (MOU 65)',rank:'Commanding Park Ranger',mou:'MOU 65',dept:'Park Rangers'}]}
];

const ASSIGN_30 = [{group:'LAX PSS',items:['PSS Watch 1','PSS Watch 2','PSS Watch 3']},{group:'VNY PSS',items:['VNY A-Watch','VNY B-Watch']},{group:'Specialized Units',items:['APIIC/RTIC','Court Liaison','CTF','DPU','ESU','K9s','Motors','Range','Special Projects','Training','VAAU']},{group:'Other',items:['My unit not listed']}];
const ASSIGN_39 = [{group:'LAX PSS',items:['PSS Watch 1','PSS Watch 2','PSS Watch 3']},{group:'VNY PSS',items:['VNY A-Watch','VNY B-Watch']},{group:'Specialized Units',items:['APIIC/RTIC','Court Liaison','CTF','DPU','ESU','Internal Affairs','K9s','Motors','Range','Special Projects','Training','VAAU']},{group:'Other',items:['My unit not listed']}];
const ASSIGN_28 = [{group:'Municipal Police',items:['Daily Posts',"Mayor's Post",'MLO-CRO','MLO-Sgt Arms']}];
const ASSIGN_65 = [{group:'Ranger Duties',items:['Griffith / Metro RGN','Valley RGN','Observatory','H.R.S.T.','Harbor RGN']}];

let state = {view:'login',member:null,token:null,row:null,loading:false,error:'',success:'',tab:'announce'};

// Restore session
try {
  const s = localStorage.getItem('laapoa_member_session');
  if (s) { const d = JSON.parse(s); Object.assign(state, d, {view:'info',loading:false,error:'',success:''}); }
} catch(e) {}

function setState(updates) {
  Object.assign(state, updates);
  // Persist session
  if (state.token && state.member) {
    try { localStorage.setItem('laapoa_member_session', JSON.stringify({member:state.member,token:state.token,row:state.row,tab:state.tab})); } catch(e) {}
  }
  render();
}

function clearSession() {
  try { localStorage.removeItem('laapoa_member_session'); } catch(e) {}
  state = {view:'login',member:null,token:null,row:null,loading:false,error:'',success:'',tab:'announce'};
  render();
}

let _clientIp='unknown';
fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>{_clientIp=d.ip||'unknown';}).catch(()=>{});

// Check token expiry and auto-logout
function checkTokenExpiry() {
  if (!state.token) return;
  try {
    const raw = atob(state.token);
    const parts = raw.split('|');
    const elapsed = (Date.now() - parseInt(parts[1])) / (1000 * 60 * 60);
    if (elapsed > 720) { // 30 days
      clearSession();
      return;
    }
    // Check again in 1 minute
    setTimeout(checkTokenExpiry, 60000);
  } catch(e) {
    clearSession();
  }
}

// Start expiry checker on load

async function apiCall(action, payload) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action, _ip:_clientIp, ...payload }),
      redirect: 'follow'
    });
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { return { error: 'Invalid response from server' }; }
  } catch(e) {
    return { error: 'Network error: ' + e.message };
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const lastName = document.getElementById('ln').value.trim();
  const cid = document.getElementById('cid').value.trim();
  const dob = document.getElementById('dob').value;
  if (!lastName || !cid || !dob) { setState({error:'All fields are required'}); return; }
  setState({loading:true, error:''});
  const res = await apiCall('login', {lastName, cid, dob});
  if (res.error) { setState({loading:false, error:res.error}); return; }
  // Store bundled data from login
  state._announcements = res.announcements || null;
  state._birthdays = res.birthdays || null;
  state._eventsEnabled = res.announcements ? res.announcements.eventsEnabled : true;
  state._decideEnabled = res.announcements ? res.announcements.decideEnabled : true;

  setState({view:'info', member:res.member, token:res.token, row:res.row, loading:false, error:'', tab:'announce'});

  initPusher();

  var annData = res.announcements;

async function handleUpdate(e) {
  e.preventDefault();
  const email = document.getElementById('ue')?.value?.trim() || '';
  if (email) {

    for (const d of BLOCKED) {

  }
  const serial = document.getElementById('userial')?.value?.trim() || '';
  const isMou65 = state.member.mou === 'MOU 65';

    assignment: document.getElementById('ua')?.value || '',
    retirement: document.getElementById('uretire')?.value || '',

    address: document.getElementById('uaddr')?.value?.trim() || '',

    showMobilePhoneTime: state.member.showMobilePhoneTime || '',

  };
  setState({loading:true, error:'', success:''});
  // Show updating overlay
  var overlay = document.createElement('div');
  overlay.className = 'update-overlay';
  overlay.id = 'updateOverlay';
  overlay.innerHTML = '<div class="update-text">UPDATING YOUR PROFILE</div><div class="update-wave"><span></span><span></span><span></span><span></span></div><div class="update-bar"><div class="update-bar-inner"></div></div>';

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtPhone(p) {
  if (!p) return '';
  const digits = p.replace(/\D/g, '');
  if (digits.length === 10) return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6);
  if (digits.length === 11 && digits[0] === '1') return '(' + digits.slice(1,4) + ') ' + digits.slice(4,7) + '-' + digits.slice(7);
  return p;
}

function formatBday(dob) {
  if (!dob) return '';
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var match = String(dob).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (match) return months[parseInt(match[2])-1] + ' ' + parseInt(match[3]);
  match = String(dob).match(/(\d{1,2})\/(\d{1,2})/);
  if (match) return months[parseInt(match[1])-1] + ' ' + parseInt(match[2]);
  return '';
}

const COOLDOWN_MS = 1 * 60 * 60 * 1000; // 1 hour

function getDirectoryStatus(m) {
  // Returns: { blocked: bool, mobileBlocked: bool, reason: string, countdownMs: number, mobileCountdownMs: number }
  if (m.directoryOptOut === 'true') {
    return { blocked: true, mobileBlocked: true, reason: 'You are currently hidden from the directory. To use the directory, make yourself visible on the Update tab.', countdownMs: 0, mobileCountdownMs: 0 };
  }
  let dirCountdown = 0;
  if (m.directoryOptOutTime) {
    const optOutTime = new Date(m.directoryOptOutTime).getTime();
    if (!isNaN(optOutTime)) {
      const remaining = COOLDOWN_MS - (Date.now() - optOutTime);
      if (remaining > 0) dirCountdown = remaining;
    }
  }
  if (dirCountdown > 0) {
    const hrs = Math.floor(dirCountdown / (1000 * 60 * 60));
    const mins = Math.floor((dirCountdown % (1000 * 60 * 60)) / (1000 * 60));
    return { blocked: true, mobileBlocked: true, reason: 'Directory access is temporarily unavailable. Access will be restored in ' + (hrs > 0 ? hrs + 'h ' : '') + mins + 'm.', countdownMs: dirCountdown, mobileCountdownMs: 0 };
  }
  // Check mobile phone cooldown
  let mobileCountdown = 0;
  if (m.showMobilePhoneTime) {
    const mobileTime = new Date(m.showMobilePhoneTime).getTime();
    if (!isNaN(mobileTime)) {
      const remaining = COOLDOWN_MS - (Date.now() - mobileTime);
      if (remaining > 0) mobileCountdown = remaining;
    }
  }
  const mobileBlocked = (m.showMobilePhone !== 'true') || mobileCountdown > 0;
  return { blocked: false, mobileBlocked: mobileBlocked, reason: '', countdownMs: 0, mobileCountdownMs: mobileCountdown };
}

function generateVCard(person) {
  const parts=(person.name||'').split(' ');
  const last=parts.pop()||'';
  const first=parts.join(' ')||'';
  const lines=[
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:'+last+';'+first+';;;',
    'FN:'+person.name,
    'ORG:LAAPOA'+(person.assignment?' - '+person.assignment:''),
    'TITLE:'+(person.rank||''),
  ];
  if(person.cityCell){
    var cc=person.cityCell.replace(/[^+\d]/g,'');
    lines.push('item1.TEL:'+cc);
    lines.push('item1.X-ABLabel:City Cell');
  }
  if(person.mobilePhone){
    var mp=person.mobilePhone.replace(/[^+\d]/g,'');
    lines.push('item2.TEL:'+mp);
    lines.push('item2.X-ABLabel:Mobile');
  }
  lines.push('END:VCARD');
  return lines.join('\r\n');
}

function saveContact(person) {
  const vcf = generateVCard(person);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  
  if (isIOS) {
    // iOS: data URI triggers native contact import
    const uri = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcf);
    window.open(uri, '_self');
  } else {
    // Android: download then prompt to open
    const blob = new Blob([vcf], {type:'text/x-vcard'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (person.name||'contact').replace(/\s+/g,'_') + '.vcf';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      // Show toast to guide user
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface-raised);color:var(--gold);padding:14px 20px;border-radius:12px;font-size:14px;z-index:999;border:1px solid var(--border-bright);text-align:center;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.5)';
      toast.innerHTML = 'Tap the downloaded file in your notification bar to add to Contacts';
      document.body.appendChild(toast);
      setTimeout(function(){document.body.removeChild(toast);}, 5000);
    }, 500);
  }
}

    wireTabEvents();

    // Load announcements and birthdays together
    var bdayHtmlGlobal = '';
    var nowH = new Date().getHours();
    var nowM = new Date().getMinutes();
    var nowTime = nowH * 100 + nowM;
    var showBday = (nowTime >= 430 && nowTime <= 1430);

    // Use bundled data from login if available, otherwise fetch
    var bdayPromise;
    if (showBday && state._birthdays) {

    if (state._announcements) {
      annPromise = Promise.resolve(state._announcements);

      annPromise = apiCall('getAnnouncements',{token:state.token});

    Promise.all([bdayPromise, annPromise]).then(function(results){
      var bdayRes = results[0];
      var annRes = results[1];
      var el = document.getElementById('annContent');
      if (!el) return;

      if (annRes.error) { el.innerHTML='<div class="err">'+esc(annRes.error)+'</div>'; return; }

      // Build birthday HTML
      var bdayHtml = '';
      if (showBday && bdayRes.ok && bdayRes.birthdays && bdayRes.birthdays.length > 0) {
        var namesHtml = '';
        bdayRes.birthdays.forEach(function(b){

      var posts = annRes.posts || [];
      var announcementOrder = annRes.announcementOrder || [];
      var videoUrl = annRes.videoUrl || '';
      var videoEnabled = annRes.videoEnabled || false;

      if (posts.length === 0 && !bdayHtml && !videoEnabled) {
        el.innerHTML = '<div class="search-empty">No announcements yet</div>';
        return;
      }

      // Build post HTML map by id
      var postMap = {};
      posts.forEach(function(p){
        postMap[String(p.id)] = '<div class="ann-post"><div class="ann-meta">'+esc(String(p.timestamp||''))+(p.postedBy?' \u00b7 '+esc(String(p.postedBy)):'')+'</div><div class="ann-title">'+esc(String(p.title||''))+'</div><div class="ann-body">'+String(p.body||'')+'</div></div>';
      });

      // Build video embed HTML
      var videoHtml = '';
      if (videoEnabled && videoUrl) {
        var embedUrl = videoUrl;
        var ytMatch = videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/live\/)([^&\s?]+)/);
        if (ytMatch) embedUrl = 'https://www.youtube.com/embed/' + ytMatch[1] + '?autoplay=0&rel=0';

      }

      // Build ordered output from JSON order
      var allItems = [];
      if (announcementOrder.length > 0) {
        announcementOrder.forEach(function(id){
          if (id === 'BIRTHDAYS' && bdayHtml) allItems.push(bdayHtml);
          else if (id === 'VIDEO' && videoHtml) allItems.push(videoHtml);
          else if (postMap[id]) { allItems.push(postMap[id]); delete postMap[id]; }
        });
        // Add any posts not in order (newly created)
        Object.values(postMap).forEach(function(h){ allItems.push(h); });
        // Ensure birthday/video show if not in order
        if (bdayHtml && announcementOrder.indexOf('BIRTHDAYS') < 0) allItems.unshift(bdayHtml);
        if (videoHtml && announcementOrder.indexOf('VIDEO') < 0) allItems.push(videoHtml);
      } else {
        // No saved order — default: birthday, video, posts
        if (bdayHtml) allItems.push(bdayHtml);
        if (videoHtml) allItems.push(videoHtml);
        posts.forEach(function(p){ allItems.push(postMap[String(p.id)] || ''); });
      }

      el.innerHTML = allItems.join('');
      if (bdayHtml) startCelebration();
    }).catch(function(err){
      var el=document.getElementById('annContent');
      if(el)el.innerHTML='<div class="err">Failed to load announcements. Please try again.</div>';

    function loadEvents(){
      apiCall('getGiveaways',{token:state.token}).then(function(res){

          var entryCount=entries.length;
          var isClosed=g.status==='closed';

          html+='<div class="ann-post">';

            html+='<canvas id="wheelCanvas_'+esc(String(g.id))+'" width="560" height="560" style="width:280px;height:280px"></canvas>';

            html+='<div style="padding:12px;background:rgba(198,151,63,.1);border-radius:8px"><div style="font-size:15px;color:var(--gold);font-weight:600">\ud83c\udfc6 '+(g.winnerName.includes(',')?'Winners':'Winner')+': '+esc(g.winnerName)+'</div></div>';

        });

function startCelebration() {
  var canvas = document.getElementById('bdayCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var parent = canvas.parentElement;
  canvas.width = parent.offsetWidth;
  canvas.height = parent.offsetHeight;
  var W = canvas.width, H = canvas.height;
  var particles = [];
  var fireworks = [];
  var colors = ['#C6973F','#D4AD5E','#E8E8EC','#C0392B','#27AE60','#3498DB','#E67E22','#9B59B6','#F39C12','#1ABC9C'];

  function randColor() { return colors[Math.floor(Math.random()*colors.length)]; }

  // Spawn confetti
  for (var i = 0; i < 60; i++) {
    particles.push({
      x: Math.random()*W, y: Math.random()*H - H,
      w: Math.random()*6+3, h: Math.random()*4+2,
      vx: (Math.random()-0.5)*2, vy: Math.random()*2+1,
      rot: Math.random()*360, vr: (Math.random()-0.5)*8,
      color: randColor(), alpha: 1
    });
  }

  // Firework particles
  function spawnFirework() {
    var fx = Math.random()*W*0.6+W*0.2;
    var fy = Math.random()*H*0.4+H*0.1;
    var c = randColor();
    for (var j = 0; j < 20; j++) {
      var angle = (Math.PI*2/20)*j;
      var speed = Math.random()*2+1;
      fireworks.push({
        x: fx, y: fy,
        vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
        color: c, alpha: 1, life: 60+Math.random()*30, age: 0, r: Math.random()*2+1
      });
    }
  }

  var frame = 0;
  var animId;
  function animate() {
    ctx.clearRect(0,0,W,H);
    // Confetti
    var fadeStart = 480; // start fading at frame 480 (last 2 seconds)
    var confettiAlpha = frame < fadeStart ? 0.8 : 0.8 * (1 - (frame - fadeStart) / (600 - fadeStart));
    particles.forEach(function(p){
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (p.y > H) { p.y = -10; p.x = Math.random()*W; }
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = confettiAlpha;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    // Fireworks
    fireworks.forEach(function(f){
      f.x += f.vx; f.y += f.vy; f.vy += 0.03; f.age++;
      f.alpha = Math.max(0, 1 - f.age/f.life);
      if (f.alpha <= 0) return;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
      ctx.fillStyle = f.color;
      ctx.globalAlpha = f.alpha;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    fireworks = fireworks.filter(function(f){ return f.alpha > 0; });
    if (frame % 90 === 0 && frame < 480) spawnFirework();
    frame++;
    if (frame < 600) animId = requestAnimationFrame(animate);
    else { ctx.clearRect(0,0,W,H); canvas.style.display='none'; }
  }
  spawnFirework();
  animate();
}

function runWheelReplay(gid, entries, winnerName) {
  var canvas = document.getElementById('wheelCanvas_' + gid);
  var confCanvas = document.getElementById('confCanvas_' + gid);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var confCtx = confCanvas ? confCanvas.getContext('2d') : null;
  if (confCanvas) { confCanvas.width = 280; confCanvas.height = 280; }
  var colors = ['#C6973F','#185FA5','#993C1D','#0F6E56','#534AB7','#993556','#854F0B','#3B6D11','#A32D2D','#085041','#3C3489','#72243E'];
  var n = entries.length;

  // Find winner index
  var winnerNames = winnerName.split(', ');
  var winnerIdx = 0;
  for (var i = 0; i < entries.length; i++) {
    var fullName = entries[i].rank + ' ' + entries[i].name;
    if (winnerNames.indexOf(fullName) >= 0) { winnerIdx = i; break; }
  }

  // Shuffle but ensure winner lands under pointer
  function shuffle(a) { var b = a.slice(); for (var i = b.length - 1; i > 0; i--) { var j = Math.floor(Math.random() * (i + 1)); var t = b[i]; b[i] = b[j]; b[j] = t; } return b; }
  var wheelOrder = shuffle(entries);
  var winWheelIdx = 0;
  for (var i = 0; i < wheelOrder.length; i++) { if (wheelOrder[i].num === entries[winnerIdx].num) { winWheelIdx = i; break; } }

  var arc = (Math.PI * 2) / n;
  var targetAngle = Math.PI * 1.5 - (winWheelIdx * arc + arc / 2);
  var fullSpins = Math.PI * 2 * (14 + Math.random() * 4);
  var totalRotation = fullSpins + (targetAngle % (Math.PI * 2));
  if (totalRotation < fullSpins) totalRotation += Math.PI * 2;

  var angle = 0;
  function drawWheel() {
    ctx.clearRect(0, 0, 560, 560);
    for (var i = 0; i < n; i++) {
      var sa = angle + i * arc;
      ctx.beginPath(); ctx.moveTo(280, 280); ctx.arc(280, 280, 260, sa, sa + arc); ctx.closePath();
      ctx.fillStyle = colors[(wheelOrder[i].num - 1) % colors.length]; ctx.fill();
      ctx.strokeStyle = '#0B1A33'; ctx.lineWidth = 2; ctx.stroke();
      ctx.save(); ctx.translate(280, 280); ctx.rotate(sa + arc / 2);
      ctx.fillStyle = '#E8E8EC'; ctx.font = '500 ' + (n > 20 ? '14' : '22') + 'px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(wheelOrder[i].num, 165, 0); ctx.restore();
    }
  }

  var dur = 15000, start = performance.now();
  function easeOut(t) { if (t < 0.3) return t / 0.3 * 0.5; var t2 = (t - 0.3) / 0.7; return 0.5 + 0.5 * (1 - Math.pow(1 - t2, 5)); }

  function anim(now) {
    var elapsed = now - start;
    var t = Math.min(elapsed / dur, 1);
    angle = easeOut(t) * totalRotation;
    drawWheel();
    if (t < 1) { requestAnimationFrame(anim); }
    else { fireReplayConfetti(confCtx); }
  }
  requestAnimationFrame(anim);
}

function fireReplayConfetti(ctx) {
  if (!ctx) return;
  var ps = []; var cc = ['#C6973F','#D4AD5E','#E8E8EC','#C0392B','#27AE60','#3498DB','#E67E22','#9B59B6'];
  for (var i = 0; i < 100; i++) {
    ps.push({ x: 140, y: 140, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 1) * 8 - 2, w: Math.random() * 6 + 3, h: Math.random() * 4 + 2, rot: Math.random() * 360, vr: (Math.random() - 0.5) * 10, color: cc[Math.floor(Math.random() * cc.length)], life: 140 + Math.random() * 60, age: 0 });
  }
  function go() {
    ctx.clearRect(0, 0, 280, 280); var alive = false;
    ps.forEach(function(p) { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.rot += p.vr; p.age++; if (p.age > p.life) return; alive = true; ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180); ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, 1 - p.age / p.life); ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore(); });
    ctx.globalAlpha = 1; if (alive) requestAnimationFrame(go); else ctx.clearRect(0, 0, 280, 280);
  }
  go();
  setTimeout(function() { for (var i = 0; i < 60; i++) { ps.push({ x: 140, y: 140, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 1) * 8 - 2, w: Math.random() * 6 + 3, h: Math.random() * 4 + 2, rot: Math.random() * 360, vr: (Math.random() - 0.5) * 10, color: cc[Math.floor(Math.random() * cc.length)], life: 140 + Math.random() * 60, age: 0 }); } }, 800);
}

function filterBBPosts(q) {
  var posts = document.querySelectorAll('#bbContent .bb-post');
  posts.forEach(function(post) {
    var text = post.textContent.toLowerCase();
    post.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
}

function renderExpandedCard() {
  var existing = document.getElementById('contactOverlay');
  if (existing) existing.remove();
  if (window._cardTimer) { clearInterval(window._cardTimer); window._cardTimer = null; }
  if (!expandedContact) return;

  var p = expandedContact;
  var pi = (p.name||'').split(' ').map(function(w){return w[0];}).filter(Boolean).slice(0,2).join('').toUpperCase();
  var ds = getDirectoryStatus(state.member);
  var canSeeMobile = !ds.mobileBlocked;
  var hasCity = !!p.cityCell;
  var hasMobile = canSeeMobile && !!p.mobilePhone;

  var phonesHtml = '';
  if (hasCity) {
    phonesHtml += '<div class="cf-phone"><div class="cf-phone-label">City Cell</div><div class="cf-phone-num"><a href="tel:'+esc(p.cityCell)+'">'+esc(fmtPhone(p.cityCell))+'</a></div><div class="cf-phone-hint">Tap number to dial</div></div>';
  }
  if (hasMobile) {
    phonesHtml += '<div class="cf-phone"><div class="cf-phone-label">Mobile Phone</div><div class="cf-phone-num"><a href="tel:'+esc(p.mobilePhone)+'">'+esc(fmtPhone(p.mobilePhone))+'</a></div><div class="cf-phone-hint">Tap number to dial</div></div>';
  }
  if (!hasCity && !hasMobile) {
    phonesHtml += '<div class="cf-phone"><div class="cf-phone-label">Phone</div><div class="cf-phone-num" style="color:var(--text-muted);font-size:14px">No phone available</div></div>';
  }

  var overlay = document.createElement('div');
  overlay.id = 'contactOverlay';
  overlay.className = 'contact-overlay';
  overlay.innerHTML =
    '<div class="contact-full" style="position:relative;">' +
      '<div id="cfCloseBtn" style="position:absolute;top:14px;right:14px;width:36px;height:36px;cursor:pointer;z-index:2;">' +
        '<svg viewBox="0 0 36 36" width="36" height="36">' +
          '<circle cx="18" cy="18" r="16" fill="none" stroke="rgba(198,151,63,.2)" stroke-width="2"/>' +
          '<circle id="cfRing" cx="18" cy="18" r="16" fill="none" stroke="#C6973F" stroke-width="2" stroke-dasharray="100.53" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 18 18)" style="transition:stroke-dashoffset 1s linear;"/>' +
          '<line x1="13" y1="13" x2="23" y2="23" stroke="#8A8FA0" stroke-width="1.5" stroke-linecap="round"/>' +
          '<line x1="23" y1="13" x2="13" y2="23" stroke="#8A8FA0" stroke-width="1.5" stroke-linecap="round"/>' +
        '</svg>' +
      '</div>' +
      '<div class="cf-header">' +
        '<div class="cf-avatar">'+pi+'</div>' +
        '<div class="cf-name">'+esc(p.name)+'</div>' +
        '<div class="cf-detail">'+esc(p.rank||'')+(p.assignment?' \xb7 '+esc(p.assignment):'')+'</div>' +
        (p.serialNumber?'<div class="cf-serial">Serial \u2116 '+esc(p.serialNumber)+'</div>':'') +
      '</div>' +
      '<div class="cf-body">' +
        '<div class="cf-section">' +
          '<div class="cf-section-title">Phone Numbers</div>' +
          phonesHtml +
        '</div>' +
      '</div>' +
      '<div class="cf-actions">' +
        '<button class="cf-btn cf-btn-add" id="cfAdd">Add to Contacts</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  function closeCard() {
    if (window._cardTimer) { clearInterval(window._cardTimer); window._cardTimer = null; }
    expandedContact = null;
    renderExpandedCard();
  }

  overlay.addEventListener('click', function(ev) {
    if (ev.target === overlay) closeCard();
  });
  document.getElementById('cfCloseBtn').addEventListener('click', closeCard);
  document.getElementById('cfAdd').addEventListener('click', function() {
    saveContact(p);
  });

  // 60-second countdown ring + auto-close
  var ring = document.getElementById('cfRing');
  var circumference = 2 * Math.PI * 16;
  ring.style.strokeDasharray = circumference;
  var elapsed = 0;
  var total = 60;
  window._cardTimer = setInterval(function() {
    elapsed++;
    var progress = elapsed / total;
    ring.style.strokeDashoffset = circumference * progress;
    if (elapsed >= total) closeCard();
  }, 1000);
}

render();

// Force update service worker and clear old caches
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    registrations.forEach(function(r) { r.unregister(); });
  });
  caches.keys().then(function(names) {
    names.forEach(function(name) { caches.delete(name); });
  });
  setTimeout(function() {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }, 1000);
}
</script>
