<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAAPOA Member Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1A33;--navy-light:#132B4F;--gold:#C6973F;--gold-light:#D4AD5E;--gold-dim:rgba(198,151,63,.15);--red:#C0392B;--red-dim:rgba(192,57,43,.12);--green:#27AE60;--green-dim:rgba(39,174,96,.12);--blue:#3498DB;--blue-dim:rgba(52,152,219,.12);--text:#E8E8EC;--text-dim:#8A8FA0;--text-muted:#5A6070;--surface:#0F1F38;--surface-raised:#152A4A;--surface-overlay:#1A3260;--border:rgba(198,151,63,.12);--border-bright:rgba(198,151,63,.3);--radius:8px;--radius-lg:12px;--shadow:0 4px 24px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
.ann-toolbar::-webkit-scrollbar{display:none}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sidebar-brand .badge{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:var(--navy)}
.sidebar-brand h1{font-size:15px;font-weight:600;letter-spacing:.5px;line-height:1.3}
.sidebar-brand span{font-size:11px;color:var(--text-dim);font-weight:400}
.sidebar-nav{padding:12px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);padding:12px 12px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;color:var(--text-dim);font-size:13px;font-weight:500;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface-raised);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold)}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.nav-item .cnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;opacity:.7}
.sidebar-stats{padding:14px 20px;border-top:1px solid var(--border)}
.stat-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.stat-row .lb{color:var(--text-dim)}.stat-row .vl{color:var(--gold-light);font-family:'JetBrains Mono',monospace;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:14px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;flex:1;min-width:180px;max-width:340px}
.search-box input{background:none;border:none;color:var(--text);font-size:14px;outline:none;width:100%;font-family:inherit}
.search-box input::placeholder{color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface-raised);color:var(--text);transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{border-color:var(--border-bright);background:var(--surface-overlay)}
.btn-gold{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
.btn-gold:hover{background:var(--gold-light);border-color:var(--gold-light)}
.btn-red{background:var(--red-dim);color:var(--red);border-color:transparent}
.btn-red:hover{background:var(--red);color:white}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-outline-gold{background:transparent;border-color:var(--gold);color:var(--gold)}
.btn-outline-gold:hover{background:var(--gold-dim)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--gold-dim);border:1px solid var(--border-bright);border-radius:20px;font-size:12px;color:var(--gold);font-weight:500}
.pill button{background:none;border:none;color:var(--gold);cursor:pointer;padding:0;display:flex;opacity:.6}
.pill button:hover{opacity:1}
.table-wrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{position:sticky;top:0;z-index:10;background:var(--surface)}
th{text-align:left;padding:10px 14px;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--gold)}
td{padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
tr:hover td{background:var(--surface-raised)}
.chk{width:18px;height:18px;border:2px solid var(--text-muted);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.chk.on{background:var(--gold);border-color:var(--gold);color:var(--navy)}
.badge-s{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.s-Active{background:var(--green-dim);color:var(--green)}
.s-Retired{background:var(--gold-dim);color:var(--gold)}
.s-Inactive{background:rgba(255,255,255,.06);color:var(--text-dim)}
.s-Probationary{background:var(--blue-dim);color:var(--blue)}
.s-Terminated{background:var(--red-dim);color:var(--red)}
.s-Lateral{background:rgba(155,89,182,.12);color:#9B59B6}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;animation:fi .15s ease}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;width:380px;max-width:90vw;box-shadow:var(--shadow)}
.confirm-box h3{font-size:16px;font-weight:600;margin-bottom:8px;color:var(--red)}
.confirm-box p{font-size:14px;color:var(--text-dim);margin-bottom:6px;line-height:1.5}
.confirm-box .cname{color:var(--text);font-weight:600}
.confirm-box .cactions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.contact-card{width:420px;max-width:95vw}
.cc-header{padding:24px 24px 20px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:flex-start}
.cc-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--navy);flex-shrink:0}
.cc-info h2{font-size:18px;font-weight:700;margin-bottom:2px}
.cc-info .cc-title{font-size:13px;color:var(--gold-light);font-weight:500}
.cc-info .cc-dept{font-size:12px;color:var(--text-dim);margin-top:2px}
.cc-info .cc-status{margin-top:6px}
.cc-body{padding:20px 24px}
.cc-section{margin-bottom:18px}
.cc-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:600;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cc-row{display:flex;align-items:flex-start;gap:12px;padding:6px 0;font-size:13px}
.cc-row .cc-icon{color:var(--text-muted);flex-shrink:0;margin-top:1px}
.cc-row .cc-label{color:var(--text-dim);min-width:80px;font-size:12px}
.cc-row .cc-val{color:var(--text);word-break:break-all}
.cc-row a{color:var(--gold);text-decoration:none}
.cc-row a:hover{text-decoration:underline}
.cc-actions{display:flex;gap:8px;padding:16px 24px;border-top:1px solid var(--border)}
.cc-actions .btn{flex:1;justify-content:center}
.share-panel{margin-top:12px;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.share-panel .sp-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:600;margin-bottom:10px}
.share-opt{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;cursor:pointer}
.share-opt .chk{width:16px;height:16px}
.share-preview{background:var(--surface-raised);border-radius:var(--radius);padding:10px 12px;margin-top:10px;font-size:12px;color:var(--text-dim);white-space:pre-line;line-height:1.5}
.share-btns{display:flex;gap:8px;margin-top:10px}
.notif-badge{background:var(--red);color:white;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;margin-left:auto;font-family:'JetBrains Mono',monospace}
.notif-list{max-height:100%;overflow-y:auto}
.notif-item{padding:14px 0;border-bottom:1px solid var(--border)}
.notif-item:last-child{border-bottom:none}
.notif-item.unread{border-left:3px solid var(--gold);padding-left:12px;margin-left:-1px}
.notif-item .ni-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.notif-item .ni-name{font-weight:600;font-size:14px}
.notif-item .ni-time{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.notif-item .ni-change{font-size:13px;color:var(--text-dim);padding:3px 0}
.notif-item .ni-change .ni-field{color:var(--gold-light);font-weight:500}
.notif-item .ni-change .ni-old{color:var(--red);text-decoration:line-through;opacity:.7}
.notif-item .ni-change .ni-new{color:var(--green)}
.import-alert{background:var(--navy);border:1px solid rgba(230,126,34,.3);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.import-alert .ia-name{font-weight:600;font-size:14px;margin-bottom:4px}
.import-alert .ia-cid{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.import-alert .ia-diff{font-size:12px;color:var(--text-dim);margin-top:6px;line-height:1.6}
.import-drop{border:2px dashed var(--border-bright);border-radius:var(--radius);padding:40px 20px;text-align:center;color:var(--text-dim);cursor:pointer;transition:all .15s;margin-bottom:16px}
.import-drop:hover,.import-drop.drag{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.import-drop input{display:none}
.import-preview{max-height:300px;overflow-y:auto;margin-bottom:16px}
.import-preview table{font-size:12px}
.import-preview td,.import-preview th{padding:6px 10px}
.import-stat{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.import-stat .is{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:100px}
.import-stat .is .isn{font-size:20px;font-weight:700;color:var(--gold);font-family:'JetBrains Mono',monospace}
.import-stat .is .isl{font-size:11px;color:var(--text-dim);margin-top:2px}
.racts{display:flex;gap:4px}
.racts button{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;border-radius:4px;display:flex}
.racts button:hover{color:var(--gold);background:var(--gold-dim)}
.racts button.del:hover{color:var(--red);background:var(--red-dim)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;justify-content:flex-end;animation:fi .15s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes si{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel{width:540px;max-width:95vw;background:var(--surface);height:100vh;height:100dvh;display:flex;flex-direction:column;animation:si .2s ease;border-left:1px solid var(--border)}
.ph{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border)}
.ph h2{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.ph button{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;display:flex}
.ph button:hover{color:var(--text)}
.pb{flex:1;overflow-y:auto;padding:24px}
.pf{padding:16px 24px;padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--surface)}
.fgt{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin:20px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fgt:first-child{margin-top:0}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.fr.full{grid-template-columns:1fr}
.fd label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
.fd input,.fd select,.fd textarea{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
.fd input:focus,.fd select:focus,.fd textarea:focus{border-color:var(--gold)}
.fd textarea{min-height:60px;resize:vertical}
.fd select{cursor:pointer}
.ep{width:660px}
.rsum{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.rsum .rc{font-size:22px;font-weight:700;color:var(--gold);font-family:'JetBrains Mono',monospace}
.rsum .rd{font-size:13px;color:var(--text-dim);margin-top:2px}
.rtags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;max-height:80px;overflow-y:auto}
.rtag{font-size:11px;background:var(--surface-raised);padding:2px 8px;border-radius:12px;color:var(--text-dim)}
.ef{margin-bottom:14px}
.ef label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
.ef input,.ef textarea{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.ef input:focus,.ef textarea:focus{border-color:var(--gold)}
.ef textarea{min-height:180px;resize:vertical;font-size:13px;line-height:1.6}
.rte-toolbar{display:flex;gap:2px;padding:6px;background:var(--surface-raised);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;flex-wrap:wrap}
.rte-btn{background:none;border:1px solid transparent;color:var(--text-dim);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:13px;font-family:inherit;display:flex;align-items:center;justify-content:center;min-width:28px;height:28px}
.rte-btn:hover{background:var(--surface-overlay);color:var(--text);border-color:var(--border)}
.rte-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--border-bright)}
.rte-sep{width:1px;background:var(--border);margin:2px 4px}
.rte-body{min-height:200px;background:var(--navy);border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;line-height:1.6;overflow-y:auto}
.rte-body:focus{border-color:var(--gold)}
.rte-body ul,.rte-body ol{margin-left:20px}
.rte-body a{color:var(--gold)}
.efrom{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-dim);margin-bottom:16px}
.efrom strong{color:var(--text)}
.mbar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mbar .ml{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.mbtn{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border-bright);background:var(--gold-dim);color:var(--gold);transition:all .15s;font-family:'JetBrains Mono',monospace}
.mbtn:hover{background:var(--gold);color:var(--navy)}
.pvbox{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-top:12px;font-size:13px;line-height:1.6;color:var(--text-dim)}
.pvbox .pvl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;font-weight:600;display:flex;align-items:center;gap:6px}
.pvbox .hl{color:var(--gold);font-weight:600}
.gcards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.gcard{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;cursor:pointer;transition:all .15s;position:relative}
.gcard:hover{border-color:var(--border-bright)}
.gcard.sel{border-color:var(--gold);background:var(--gold-dim)}
.gcard .gn{font-size:13px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.gcard .gc{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold-light)}
.gcard .gck{position:absolute;top:10px;right:10px}
.sbar{display:flex;align-items:center;gap:12px;padding:10px 24px;background:var(--gold-dim);border-bottom:1px solid var(--border-bright);font-size:13px;color:var(--gold);font-weight:500}
.sbar .sc{font-family:'JetBrains Mono',monospace}
.sat{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;cursor:pointer;transition:all .15s}
.sat:hover{border-color:var(--border-bright)}
.sat.on{border-color:var(--gold);background:var(--gold-dim)}
.sat .sl{font-size:13px;font-weight:600}
.sat .ss{font-size:11px;color:var(--text-dim)}
.cinfo{background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px;font-size:13px}
.cinfo code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface-raised);padding:2px 6px;border-radius:4px;color:var(--gold-light)}
.cinfo p{margin-bottom:8px;color:var(--text-dim);line-height:1.5}
.cinfo p:last-child{margin-bottom:0}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--green);color:white;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow);z-index:200;animation:fi .2s ease}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-dim);text-align:center;gap:12px}
.empty p{font-size:14px}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;overflow:hidden;border:1px solid var(--border);margin-bottom:14px}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.gcr{display:flex;gap:8px;margin-top:12px}
.gcr input{flex:1;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.gcr input:focus{border-color:var(--gold)}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy);padding:20px}
.login-box{width:380px;max-width:95vw;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px 32px;box-shadow:var(--shadow)}
.login-box .lb-badge{width:56px;height:56px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:var(--navy);margin:0 auto 16px}
.login-box h1{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.login-box .lb-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:28px}
.login-box .lf{margin-bottom:16px}
.login-box .lf label{display:block;font-size:12px;font-weight:500;color:var(--text-dim);margin-bottom:4px}
.login-box .lf input{width:100%;background:var(--navy);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.login-box .lf input:focus{border-color:var(--gold)}
.login-box .lerr{background:var(--red-dim);color:var(--red);padding:8px 12px;border-radius:var(--radius);font-size:13px;margin-bottom:16px}
.login-box .lbtn{width:100%;padding:12px;background:var(--gold);color:var(--navy);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.login-box .lbtn:hover{background:var(--gold-light)}
.login-box .lbtn:disabled{opacity:.5;cursor:not-allowed}
.login-box .ldemo{text-align:center;margin-top:16px;font-size:12px;color:var(--text-muted)}

function fmtPhone(p) {
  if (!p) return '';
  const digits = String(p).replace(/\D/g, '');
  if (digits.length === 10) return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6);
  if (digits.length === 11 && digits[0] === '1') return '(' + digits.slice(1,4) + ') ' + digits.slice(4,7) + '-' + digits.slice(7);
  return String(p);
}

// CSV Parser
function parseCSV(text){
  const lines=[];let cur=[];let field='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}
    else{if(c==='"')inQ=true;else if(c===','){cur.push(field);field='';}else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;cur.push(field);if(cur.length>1||cur[0]!=='')lines.push(cur);cur=[];field='';}else field+=c;}
  }
  if(field||cur.length)cur.push(field);
  if(cur.length>1||cur[0]!=='')lines.push(cur);
  return lines;
}

function parseDate(d){
  if(!d)return'';
  // Handle "14-AUG-2023" format
  const m={'JAN':'01','FEB':'02','MAR':'03','APR':'04','MAY':'05','JUN':'06','JUL':'07','AUG':'08','SEP':'09','OCT':'10','NOV':'11','DEC':'12'};
  const p=d.match(/(\d{1,2})-([A-Z]{3})-(\d{4})/);
  if(p)return `${p[3]}-${m[p[2]]||'01'}-${p[1].padStart(2,'0')}`;
  return d;
}

function mapClassToRank(cls,mouRaw){
  const c=(cls||'').toLowerCase();
  const mou=mouRaw||'';
  if(c.includes('specialist'))return{rank:'Specialist',mou:'MOU 30'};
  if(c.includes('officer i') && !c.includes('ii') && !c.includes('iii'))return{rank:'Officer PI',mou:'MOU 30'};
  if(c.includes('officer iii'))return mou==='28'?{rank:'Officer PIII',mou:'MOU 28'}:{rank:'Officer PIII',mou:'MOU 28'};
  if(c.includes('officer ii'))return mou==='28'?{rank:'Officer PII',mou:'MOU 28'}:{rank:'Officer PII',mou:'MOU 30'};
  if(c.includes('sergeant') && c.includes('municipal'))return{rank:'Sergeant',mou:'MOU 28'};
  if(c.includes('sergeant'))return mou==='28'?{rank:'Sergeant',mou:'MOU 28'}:{rank:'Sergeant',mou:'MOU 39'};
  if(c.includes('lieutenant'))return{rank:'Lieutenant',mou:'MOU 39'};
  if(c.includes('commanding park ranger'))return{rank:'Commanding Park Ranger',mou:'MOU 65'};
  if(c.includes('senior park ranger'))return{rank:'Park Ranger Supervisor',mou:'MOU 65'};
  if(c.includes('park ranger'))return{rank:'Park Ranger',mou:'MOU 65'};
  if(c.includes('municipal') && c.includes('iii'))return{rank:'Officer PIII',mou:'MOU 28'};
  return{rank:cls||'',mou:mou?`MOU ${mou}`:''};
}

function mapCsvRow(headers,row){
  const get=(name)=>{const i=headers.indexOf(name);return i>=0?(row[i]||'').replace(/^="/,'').replace(/"$/,'').replace(/^"/,'').trim():'';};
  const firstName=get('First Name');
  const mi=get('Middle Initial');
  const lastName=get('Last Name');
  const name=[firstName,mi,lastName].filter(Boolean).join(' ');
  const phone=get('Emp. Home Telephone Area Code')+get('Emp. Home Telephone Number');
  const fmtPhone=phone.length>=10?`(${phone.slice(0,3)}) ${phone.slice(3,6)}-${phone.slice(6)}`:'';
  const workEmail=get('Work Email Address');
  const persEmail=get('Personal Email Address');
  // Personal as primary, work as fallback
  const email=persEmail||workEmail;
  const mouRaw=get('MOU #');
  const rankInfo=mapClassToRank(get('Class Title'),mouRaw);
  const status=get('Employment Status Desc');

  return{
    id:'imp_'+get('PaySR Employee ID')+'_'+Date.now().toString(36),
    name,
    dob:parseDate(get('Birth Date')),
    address:[get('Emp. Addr. - Street 1'),get('Emp. Addr. - Street 2')].filter(Boolean).join(' '),
    city:get('Emp. Addr. - City'),
    state:get('Emp. Addr. - State Abbr.')||'CA',
    zip:get('Emp. Addr. - Zip'),
    phone:fmtPhone,
    email,
    serialNumber:'',
    cid:get('PaySR Employee ID'),
    hireDate:parseDate(get('Original Hire Date')),
    retirement:'',
    department:rankInfo.mou==='MOU 30'||rankInfo.mou==='MOU 39'?'Airport Police':rankInfo.mou==='MOU 28'?'LAPD':rankInfo.mou==='MOU 65'?'Park Rangers':'',
    rank:rankInfo.rank,
    mou:rankInfo.mou,
    assignment:'',
    memberStatus:status==='Active'?'Active':status==='Terminated'?'Terminated':'Inactive',
    lateralAgency:'',
    lateralDate:'',
    memberSince:parseDate(get('Original Hire Date')),
    notes:workEmail&&persEmail?`Work: ${workEmail}`:'',
  };
}

function ImportPanel({onClose,onImport,existingMembers}){

    if(!file)return;

      const lines=parseCSV(ev.target.result);
      // Find the header row (has "PaySR Employee ID")

      for(let i=0;i<Math.min(5,lines.length);i++){
        if(lines[i].some(c=>c.includes('PaySR'))){headerIdx=i;break;}
      }
      const headers=lines[headerIdx].map(h=>h.replace(/^"/,'').replace(/"$/,'').trim());
      const rows=lines.slice(headerIdx+1).filter(r=>r.length>5);
      const mapped=rows.map(r=>mapCsvRow(headers,r)).filter(m=>m.name);

      </>}
    </div>
    <div className="pf">
      {parsed&&<button className="btn" onClick={()=>setParsed(null)}>Back</button>}
      <button className="btn" onClick={onClose}>Cancel</button>
      {parsed&&<button className="btn btn-gold" disabled={filtered.length===0||importing} onClick={()=>{setImporting(true);onImport(filtered);}}>{IC.plus} Import {stats.newCount} New Record{stats.newCount!==1?'s':''}</button>}
    </div>
  </div></div>);
}

function ContactCard({member,onClose,onEdit}){
  const m=member;
  const initials=(m.name||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();
  const fmtDate=(d)=>{if(!d)return'—';try{const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});}catch(e){return d;}};
  const[showShare,setShowShare]=useState(false);
  const[shareFields,setShareFields]=useState({name:true,rank:true,assignment:true,phone:true,email:false,department:false,mou:false,serialNumber:false});
  const[shared,setShared]=useState(false);
  const toggleShare=(k)=>setShareFields(s=>({...s,[k]:!s[k]}));

  const buildShareText=()=>{
    const lines=[];
    if(shareFields.name)lines.push(m.name);
    if(shareFields.rank)lines.push(m.rank+(shareFields.mou&&m.mou?' ('+m.mou+')':''));
    if(shareFields.department&&m.department)lines.push(m.department);
    if(shareFields.assignment&&m.assignment)lines.push(m.assignment);
    if(shareFields.serialNumber&&m.serialNumber)lines.push('Serial: '+m.serialNumber);
    if(shareFields.phone&&m.phone)lines.push(m.phone);
    if(shareFields.email&&m.email)lines.push(m.email);
    return lines.join('\n');
  };

  const handleShare=async()=>{
    const text=buildShareText();
    if(navigator.share){
      try{await navigator.share({title:m.name,text});}catch(e){}
    }else{
      try{await navigator.clipboard.writeText(text);setShared(true);setTimeout(()=>setShared(false),2000);}catch(e){
        const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);setShared(true);setTimeout(()=>setShared(false),2000);
      }

      </div>
    </div>
    <div className="cc-body" style={{flex:1,overflowY:'auto'}}>
      <div className="cc-section">
        <div className="cc-section-title">Contact</div>
        <div className="cc-row"><span className="cc-icon">{IC.mail}</span><span className="cc-label">Email</span><span className="cc-val">{m.email?<a href={`mailto:${m.email}`}>{m.email}</a>:'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.phone}</span><span className="cc-label">Phone</span><span className="cc-val">{m.phone?<a href={`tel:${m.phone}`}>{fmtPhone(m.phone)}</a>:'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.mappin}</span><span className="cc-label">Address</span><span className="cc-val" style={{whiteSpace:"pre-line"}}>{[m.address,m.city&&m.state?m.city+', '+m.state+' '+m.zip:[m.city,m.state,m.zip].filter(Boolean).join(' ')].filter(Boolean).join('\n')||'—'}</span></div>
      </div>
      <div className="cc-section">
        <div className="cc-section-title">Employment</div>
        <div className="cc-row"><span className="cc-icon">{IC.badge}</span><span className="cc-label">Serial #</span><span className="cc-val" style={{fontFamily:"'JetBrains Mono',monospace"}}>{m.serialNumber||'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.badge}</span><span className="cc-label">CID</span><span className="cc-val" style={{fontFamily:"'JetBrains Mono',monospace"}}>{m.cid||'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.person}</span><span className="cc-label">Rank</span><span className="cc-val">{m.rank||'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.group}</span><span className="cc-label">MOU</span><span className="cc-val">{m.mou||'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.group}</span><span className="cc-label">Department</span><span className="cc-val">{m.department||'—'}</span></div>
        <div className="cc-row"><span className="cc-icon">{IC.group}</span><span className="cc-label">Assignment</span><span className="cc-val">{m.assignment||'—'}</span></div>

        {m.memberStatus==='Lateral'&&<>

        {m.directoryOptOutTime&&<div className="cc-row"><span className="cc-icon">{IC.calendar}</span><span className="cc-label">Cooldown Set</span><span className="cc-val" style={{fontSize:12}}>{m.directoryOptOutTime}</span></div>}

      {showShare&&<div className="share-panel">

        {[['name','Name'],['rank','Rank'],['assignment','Assignment'],['phone','Phone'],['email','Email'],['department','Department'],['mou','MOU'],['serialNumber','Serial #']].map(([k,l])=>
          <div key={k} className="share-opt" onClick={()=>toggleShare(k)}>

        <div className="share-preview">{buildShareText()}</div>
        <div className="share-btns">
          <button className="btn btn-gold btn-sm" onClick={handleShare} style={{flex:1}}>{shared?'Copied!':navigator.share?'Share':'Copy to Clipboard'}</button>
        </div>
      </div>}
    </div>
    <div className="cc-actions">
      <button className="btn" onClick={onClose}>Close</button>
      <button className="btn" onClick={()=>setShowShare(!showShare)}>{IC.share} {showShare?'Hide':'Share'}</button>
    </div>
  </div></div>);
}

function NotificationPanel({onClose,backendUrl,authToken,flash}){
  const[changes,setChanges]=useState([]);const[loading,setLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      const res=await apiGet(backendUrl,'getChangeLog',authToken);
      if(res.ok)setChanges(res.changes||[]);
      setLoading(false);
    })();
  },[]);

  const unreadCount=changes.filter(c=>c.read!=='true').length;

  const markAllRead=async()=>{
    const unreadRows=changes.filter(c=>c.read!=='true').map(c=>parseInt(c._row));
    if(!unreadRows.length)return;
    await api(backendUrl,'markChangesRead',{token:authToken,ids:unreadRows});
    setChanges(cs=>cs.map(c=>({...c,read:'true'})));
    flash('All notifications marked as read');
  };

  // Group changes by timestamp+name
  const grouped=[];
  const seen=new Set();
  changes.forEach(c=>{
    const key=c.timestamp+'|'+c.name;
    if(!seen.has(key)){seen.add(key);grouped.push({timestamp:c.timestamp,name:c.name,cid:c.cid,read:c.read,changes:[c],_rows:[parseInt(c._row)]});}
    else{const g=grouped.find(x=>x.timestamp+'|'+x.name===key);if(g){g.changes.push(c);g._rows.push(parseInt(c._row));if(c.read!=='true')g.read='false';}}
  });

  const fmtTime=(t)=>{
    if(!t)return'';
    try{const d=new Date(t);const now=new Date();const diff=(now-d)/(1000*60);
      if(diff<1)return'Just now';if(diff<60)return Math.floor(diff)+'m ago';if(diff<1440)return Math.floor(diff/60)+'h ago';
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    }catch(e){return t;}
  };

  return(<div className="overlay" onClick={onClose}><div className="panel" onClick={e=>e.stopPropagation()}>
    <div className="ph"><h2>{IC.bell} Notifications {unreadCount>0&&<span className="notif-badge">{unreadCount}</span>}</h2><button onClick={onClose}>{IC.x}</button></div>
    <div className="pb">
      {unreadCount>0&&<div style={{marginBottom:16}}><button className="btn btn-sm btn-outline-gold" onClick={markAllRead} style={{width:'auto'}}>{IC.check} Mark all as read</button></div>}
      {loading?<div className="empty"><p>Loading...</p></div>:
      grouped.length===0?<div className="empty"><p>No member updates yet</p></div>:
      <div className="notif-list">{grouped.map((g,i)=>
        <div key={i} className={`notif-item ${g.read!=='true'?'unread':''}`}>
          <div className="ni-header">
            <span className="ni-name">{g.name} <span style={{fontWeight:400,color:'var(--text-muted)',fontSize:12}}>CID: {g.cid}</span></span>
            <span className="ni-time">{fmtTime(g.timestamp)}</span>
          </div>
          {g.changes.map((c,j)=>
            <div key={j} className="ni-change">
              <span className="ni-field">{c.field}</span>: <span className="ni-old">{c.oldValue||'(empty)'}</span> → <span className="ni-new">{c.newValue||'(empty)'}</span>
            </div>
          )}
        </div>
      )}</div>}
    </div>
    <div className="pf"><button className="btn btn-gold" onClick={onClose}>Done</button></div>
  </div></div>);
}

function VotesPanel({onClose,backendUrl,authToken,flash}){
  const[votes,setVotes]=useState([]);
  const[loading,setLoading]=useState(true);
  const[title,setTitle]=useState('');
  const[voteType,setVoteType]=useState('yesno');
  const[options,setOptions]=useState(['','']);
  const[eligibleMous,setEligibleMous]=useState({all:true,'MOU 28':false,'MOU 30':false,'MOU 39':false,'MOU 65':false});
  const[deadline,setDeadline]=useState('');
  const[showResults,setShowResults]=useState('blind');
  const[saving,setSaving]=useState(false);
  const[decideEnabled,setDecideEnabled]=useState(true);
  const descRef=React.useRef(null);

  const getDesc=()=>descRef.current?descRef.current.innerHTML.trim():'';
  const execCmd=(cmd,val)=>{document.execCommand(cmd,false,val||null);if(descRef.current)descRef.current.focus();};

  const loadVotes=async()=>{setLoading(true);const res=await api(backendUrl,'adminGetVotes',{token:authToken});if(res.ok){setVotes(res.votes||[]);setDecideEnabled(res.decideEnabled!==false);}setLoading(false);};
  React.useEffect(()=>{loadVotes();},[]);

  const handleToggle=async()=>{const nv=!decideEnabled;const res=await api(backendUrl,'toggleDecideTab',{token:authToken,enabled:nv});if(res.ok){setDecideEnabled(nv);flash('Decide tab '+(nv?'enabled':'disabled'));}};

  const handleCreate=async()=>{
    if(!title.trim())return;setSaving(true);
    const d=getDesc();
    const mous=eligibleMous.all?[]:Object.keys(eligibleMous).filter(k=>k!=='all'&&eligibleMous[k]);
    const opts=voteType==='yesno'?[]:options.filter(o=>o.trim());
    if(voteType!=='yesno'&&opts.length<2){flash('Need at least 2 options');setSaving(false);return;}
    const res=await api(backendUrl,'createVote',{token:authToken,title:title.trim(),description:d,type:voteType,options:opts,eligibleMous:mous.length>0?mous:['all'],deadline:deadline,showResults:showResults});
    setSaving(false);
    if(res.ok){flash('Vote created');setTitle('');if(descRef.current)descRef.current.innerHTML='';setVoteType('yesno');setOptions(['','']);setDeadline('');setShowResults('blind');loadVotes();}
    else flash(res.error||'Error');
  };

  const handleClose=async(id)=>{if(!confirm('Close this vote? No more votes will be accepted.'))return;await api(backendUrl,'closeVote',{token:authToken,voteId:id});flash('Vote closed');loadVotes();};
  const handleDelete=async(id)=>{if(!confirm('Permanently delete this vote and all its data?'))return;await api(backendUrl,'deleteVote',{token:authToken,voteId:id});flash('Deleted');loadVotes();};

  const tbStyle={background:'none',border:'1px solid transparent',borderRadius:4,color:'var(--text-dim)',cursor:'pointer',padding:'4px 7px',fontSize:12,fontFamily:'inherit',lineHeight:1,minWidth:28,textAlign:'center',flexShrink:0};
  const sepStyle={width:1,background:'var(--border)',margin:'2px 4px',flexShrink:0};

  return(<div className="confirm-overlay" onClick={onClose}><div className="panel" onClick={ev=>ev.stopPropagation()}>
    <div className="ph"><h2>Decide / Voting</h2><button onClick={onClose}>{IC.x}</button></div>
    <div className="pb">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,padding:'10px 14px',background:'var(--surface-raised)',borderRadius:8,border:'1px solid var(--border)'}}>
        <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>Decide tab visible to members</span>
        <div onClick={handleToggle} style={{width:40,height:22,borderRadius:11,background:decideEnabled?'#27AE60':'var(--surface-raised)',border:'1px solid var(--border)',position:'relative',cursor:'pointer',transition:'all .2s',flexShrink:0}}>
          <div style={{width:18,height:18,borderRadius:'50%',background:'white',position:'absolute',top:1,left:decideEnabled?20:1,transition:'all .2s'}}/>
        </div>
      </div>

      <div style={{marginBottom:20,padding:16,background:'var(--surface-raised)',borderRadius:8,border:'1px solid var(--border)'}}>
        <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>New Vote</div>
        <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Vote title (e.g., Approve new contract)" style={{width:'100%',marginBottom:8,padding:'8px 12px',background:'var(--navy)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:14,fontFamily:'inherit',boxSizing:'border-box'}}/>
        <div style={{display:'flex',gap:2,padding:6,background:'var(--navy)',border:'1px solid var(--border)',borderBottom:'none',borderRadius:'6px 6px 0 0',overflowX:'auto',flexWrap:'nowrap',scrollbarWidth:'none'}}>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('bold')}><strong>B</strong></button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('italic')}><em>I</em></button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('underline')}><u>U</u></button>
          <span style={sepStyle}/>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('insertUnorderedList')}>{"\u2022"}</button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>{var url=prompt('URL:','https://');if(url)execCmd('createLink',url);}}>{"\ud83d\udd17"}</button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>{var url=prompt('Image URL:','https://');if(url){document.execCommand('insertHTML',false,'<img src="'+url+'" style="max-width:100%;border-radius:6px;margin:8px 0">');if(descRef.current)descRef.current.focus();}}}>{"\ud83d\uddbc"}</button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>{if(descRef.current){if(descRef.current.dataset.mode==='html'){descRef.current.innerHTML=descRef.current.innerText;descRef.current.dataset.mode='visual';}else{descRef.current.innerText=descRef.current.innerHTML;descRef.current.dataset.mode='html';}}}} title="Toggle HTML source">{'</>'}</button>

            <select value={voteType} onChange={e=>{setVoteType(e.target.value);if(e.target.value==='yesno')setOptions(['','']);}} style={{width:'100%',padding:'6px 10px',background:'var(--navy)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit'}}>
              <option value="yesno">Yes / No</option>
              <option value="multiple">Multiple Choice</option>
              <option value="ranked">Ranked Choice</option>
            </select>
          </div>
          <div style={{minWidth:120}}>
            <label style={{fontSize:11,color:'var(--text-muted)',display:'block',marginBottom:4}}>Results</label>
            <select value={showResults} onChange={e=>setShowResults(e.target.value)} style={{width:'100%',padding:'6px 10px',background:'var(--navy)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontSize:13,fontFamily:'inherit'}}>
              <option value="blind">Blind (hidden until closed)</option>
              <option value="live">Live (visible while open)</option>

           <div style={{fontSize:12,color:'var(--text-muted)',marginBottom:8}}>
             {v.type==='yesno'?'Yes/No':v.type==='ranked'?'Ranked Choice':'Multiple Choice'} {'\u00b7'} {total} voter{total!==1?'s':''} {'\u00b7'} {v.showResults==='live'?'Live results':'Blind'} {'\u00b7'} {v.eligibleMous==='all'?'All MOUs':v.eligibleMous}
             {v.deadline&&!isClosed?' \u00b7 Deadline: '+new Date(v.deadline).toLocaleString():''}
           </div>
           {v.results&&<div style={{marginTop:4}}>
             {optList.map(opt=>{var count=v.results[opt]||0;var pct=total>0?Math.round(count/total*100):0;
               return <div key={opt} style={{marginBottom:4}}>
                 <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text-dim)',marginBottom:2}}><span>{opt}</span><span>{count} ({v.type==='ranked'?count+' pts':pct+'%'})</span></div>
                 <div style={{height:6,background:'var(--surface)',borderRadius:3,overflow:'hidden'}}><div style={{height:'100%',width:(v.type==='ranked'?Math.min(count/(total||1)*20,100):pct)+'%',background:opt==='Yes'||opt.toLowerCase().includes('yes')?'var(--green)':opt==='No'||opt.toLowerCase().includes('no')?'var(--red)':'var(--gold)',borderRadius:3,transition:'width .3s'}}/></div>
               </div>;
             })}
           </div>}
         </div>;
       })
      }
    </div>
    <div className="pf"><button className="btn btn-gold" onClick={onClose}>Done</button></div>
  </div></div>);
}

function BulletinBoardPanel({onClose,backendUrl,authToken,flash}){

    <div className="pb">

        <div style={{display:'flex',gap:2,padding:6,background:'var(--navy)',border:'1px solid var(--border)',borderBottom:'none',borderRadius:'6px 6px 0 0',overflowX:'auto',flexWrap:'nowrap',scrollbarWidth:'none'}}>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('bold')}><strong>B</strong></button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('italic')}><em>I</em></button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('underline')}><u>U</u></button>
          <span style={sepStyle}/>
          <select style={selStyle} onChange={e=>{if(e.target.value)execCmd('foreColor',e.target.value);e.target.selectedIndex=0;}} defaultValue=""><option value="">Color</option><option value="#E8E8EC">White</option><option value="#C6973F">Gold</option><option value="#C0392B">Red</option><option value="#27AE60">Green</option><option value="#3498DB">Blue</option></select>

        </div>
        <div ref={bodyRef} contentEditable={true} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'0 0 6px 6px',padding:12,color:'var(--text)',fontSize:14,fontFamily:'inherit',minHeight:60,maxHeight:160,overflowY:'auto',outline:'none',lineHeight:1.6,marginBottom:8}} onFocus={e=>e.target.style.borderColor='var(--gold)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        {!editPost&&<div style={{display:'flex',gap:12,alignItems:'center',marginBottom:8,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--text-muted)'}}>Post to:</span>

      </div>

      {loading?<div style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}>Loading...</div>:
       posts.length===0?<div style={{textAlign:'center',padding:20,color:'var(--text-muted)'}}>No posts</div>:
       posts.map(p=>{

               {isDeleted&&<span style={{fontSize:10,color:'var(--red)',marginLeft:6}}>DELETED</span>}

               {!isDeleted&&<button style={{display:'block',width:'100%',padding:'8px 14px',background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:12,fontFamily:'inherit',textAlign:'left'}} onClick={()=>handlePin(p.id,isPinned)}>{isPinned?'Unpin':'Pin to top'}</button>}
               {!isDeleted&&<button style={{display:'block',width:'100%',padding:'8px 14px',background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12,fontFamily:'inherit',textAlign:'left'}} onClick={()=>handleDelete(p.id,false)}>Delete</button>}
               <button style={{display:'block',width:'100%',padding:'8px 14px',background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12,fontFamily:'inherit',textAlign:'left',fontWeight:600}} onClick={()=>handleDelete(p.id,true)}>Delete permanently</button>

             {p.editedTimestamp&&<span> {'\u00b7'} edited {p.editedTimestamp}</span>}

       })
      }
    </div>
    <div className="pf"><button className="btn btn-gold" onClick={onClose}>Done</button></div>
  </div></div>);
}

function MissingMembersModal({missing,onClose,backendUrl,authToken,flash,onRefresh}){
  const[checked,setChecked]=useState(new Set());
  const[processing,setProcessing]=useState(false);
  const allChecked=checked.size===missing.length;
  const toggleAll=()=>{if(allChecked)setChecked(new Set());else setChecked(new Set(missing.map((_,i)=>i)));};
  const toggle=(i)=>{const s=new Set(checked);if(s.has(i))s.delete(i);else s.add(i);setChecked(s);};

  const handleSetInactive=async()=>{
    if(checked.size===0){flash('Select members first');return;}
    if(!confirm('Set '+checked.size+' member(s) to Inactive?'))return;
    setProcessing(true);
    const rows=Array.from(checked).map(i=>missing[i].row);
    const res=await api(backendUrl,'setMembersInactive',{token:authToken,rows});
    setProcessing(false);
    if(res.ok){flash(res.updated+' member(s) set to Inactive');onRefresh();onClose();}
    else{flash('Error: '+(res.error||'failed'));}
  };

  return(<div className="confirm-overlay" onClick={onClose}><div className="panel" onClick={ev=>ev.stopPropagation()}>
    <div className="ph"><h2 style={{color:'#E67E22'}}>Members Not on Import List</h2><button onClick={onClose}>{IC.x}</button></div>
    <div className="pb">
      <div className="warn" style={{marginBottom:16}}>The following {missing.length} active member(s) were NOT found on the import list. They may no longer be active. Select members to set as Inactive, or dismiss to leave unchanged.</div>
      <div style={{marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
        <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--text-dim)',cursor:'pointer'}}>
          <input type="checkbox" checked={allChecked} onChange={toggleAll} style={{cursor:'pointer'}}/> Select all ({missing.length})
        </label>
      </div>
      <div style={{maxHeight:400,overflowY:'auto'}}>
        {missing.map((m,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
          <input type="checkbox" checked={checked.has(i)} onChange={()=>toggle(i)} style={{cursor:'pointer',flexShrink:0}}/>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:500,color:'var(--text)'}}>{m.name}</div>
            <div style={{fontSize:11,color:'var(--text-muted)'}}>CID: {m.cid} · Status: {m.status}</div>
          </div>
        </div>)}
      </div>
    </div>
    <div className="pf" style={{display:'flex',gap:8}}>
      <button className="btn btn-outline" onClick={onClose}>Dismiss</button>
      <button className="btn btn-gold" onClick={handleSetInactive} disabled={processing||checked.size===0}>{processing?'Processing...':(checked.size>0?'Set '+checked.size+' to Inactive':'Select Members')}</button>
    </div>
  </div></div>);
}

function EventsPanel({onClose,backendUrl,authToken,flash}){
  const[giveaways,setGiveaways]=useState([]);
  const[loading,setLoading]=useState(true);
  const[title,setTitle]=useState('');
  const[drawDate,setDrawDate]=useState('');
  const[winnerCount,setWinnerCount]=useState(1);
  const[allowRepeatWins,setAllowRepeatWins]=useState(false);
  const[saving,setSaving]=useState(false);
  const[spinGiveaway,setSpinGiveaway]=useState(null);
  const[eventsEnabled,setEventsEnabled]=useState(true);
  const[activeMenu,setActiveMenu]=useState(null);
  const[deleteConfirm,setDeleteConfirm]=useState(null);
  const[showArchived,setShowArchived]=useState(false);
  const descRef=React.useRef(null);
  const winEmailRef=React.useRef(null);
  const thanksEmailRef=React.useRef(null);
  const[activeEditor,setActiveEditor]=useState('desc');

  const getDesc=()=>descRef.current?descRef.current.innerHTML.trim():'';
  const setDescHtml=(html)=>{if(descRef.current)descRef.current.innerHTML=html||'';};
  const getActiveRef=()=>{if(activeEditor==='winEmail')return winEmailRef;if(activeEditor==='thanksEmail')return thanksEmailRef;return descRef;};
  const execCmd=(cmd,val)=>{document.execCommand(cmd,false,val||null);var r=getActiveRef();if(r.current)r.current.focus();};
  const insertTag=(tag,editorKey)=>{
    var ref=editorKey==='winEmail'?winEmailRef:editorKey==='thanksEmail'?thanksEmailRef:descRef;
    if(ref.current){ref.current.focus();
      var sel=window.getSelection();
      if(!sel.rangeCount||!ref.current.contains(sel.anchorNode)){
        sel.selectAllChildren(ref.current);sel.collapseToEnd();
      }
      document.execCommand('insertText',false,tag);
    }
  };

  const tbStyle={background:'none',border:'1px solid transparent',borderRadius:4,color:'var(--text-dim)',cursor:'pointer',padding:'4px 7px',fontSize:12,fontFamily:'inherit',lineHeight:1,minWidth:28,textAlign:'center',flexShrink:0};
  const selStyle={background:'var(--navy)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text-dim)',cursor:'pointer',padding:'3px 4px',fontSize:11,fontFamily:'inherit',flexShrink:0};
  const sepStyle={width:1,background:'var(--border)',margin:'2px 4px',flexShrink:0};

  const loadGiveaways=async()=>{setLoading(true);const res=await api(backendUrl,'adminGetGiveaways',{token:authToken});if(res.ok){setGiveaways(res.giveaways||[]);setEventsEnabled(res.eventsEnabled!==false);}setLoading(false);};
  React.useEffect(()=>{loadGiveaways();},[]);

  const handleToggleEvents=async()=>{
    const nv=!eventsEnabled;
    const res=await api(backendUrl,'toggleEventsTab',{token:authToken,enabled:nv});
    if(res.ok){setEventsEnabled(nv);flash('Events tab '+(nv?'enabled':'disabled'));}
    else{flash('Error toggling events tab');}
  };

  const handleCreate=async()=>{
    const d=getDesc();if(!title.trim())return;setSaving(true);
    const winBody=winEmailRef.current?winEmailRef.current.innerHTML.trim():'';
    const thanksBody=thanksEmailRef.current?thanksEmailRef.current.innerHTML.trim():'';
    const res=await api(backendUrl,'createGiveaway',{token:authToken,title:title.trim(),description:d,drawDate:drawDate,winnerCount:winnerCount,winnerEmailBody:winBody,thanksEmailBody:thanksBody,allowRepeatWins:allowRepeatWins});
    setSaving(false);if(res.ok){flash('Giveaway created');setTitle('');setDescHtml('');setDrawDate('');setWinnerCount(1);setAllowRepeatWins(false);if(winEmailRef.current)winEmailRef.current.innerHTML='';if(thanksEmailRef.current)thanksEmailRef.current.innerHTML='';loadGiveaways();}
  };

  const handleDelete=async(id)=>{
    await api(backendUrl,'deleteGiveaway',{token:authToken,giveawayId:id});
    flash('Deleted permanently');setDeleteConfirm(null);setActiveMenu(null);loadGiveaways();
  };

  const handleArchive=async(id)=>{
    await api(backendUrl,'archiveGiveaway',{token:authToken,giveawayId:id});
    flash('Archived \u2014 hidden from members');setActiveMenu(null);loadGiveaways();
  };

  const handlePDF=(g)=>{
    setActiveMenu(null);
    var entries=[];try{entries=JSON.parse(g.entries||'[]');}catch(e){}
    var prevWinnerCids=(g.winnerCid||'').split(',').filter(Boolean);
    var prevWinnerNames=(g.winnerName||'').split(', ').filter(Boolean);
    var win='<html><head><style>body{font-family:Arial,sans-serif;margin:40px;color:#222}h1{color:#1a1a2e;font-size:22px;border-bottom:2px solid #C6973F;padding-bottom:8px}h2{font-size:16px;color:#333;margin-top:24px}.info{font-size:13px;color:#555;margin:4px 0}.winner{color:#8B6914;font-weight:bold;font-size:14px;margin:6px 0}table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}th{background:#1a1a2e;color:#C6973F;text-align:left;padding:8px 10px}td{padding:6px 10px;border-bottom:1px solid #ddd}.won{background:#FFF8E7;font-weight:bold;color:#8B6914}</style></head><body>';
    win+='<h1>'+g.title+'</h1>';
    win+='<div class="info">Created: '+(g.createdAt||'')+'</div>';
    if(g.drawDate)win+='<div class="info">Draw date: '+new Date(g.drawDate).toLocaleString()+'</div>';
    win+='<div class="info">Total entries: '+entries.length+'</div>';
    win+='<div class="info">Status: '+(g.status||'')+'</div>';
    if(prevWinnerNames.length>0){
      win+='<h2>Winners</h2>';
      prevWinnerNames.forEach(function(n,i){win+='<div class="winner">'+(i+1)+'. '+n+'</div>';});
    }
    win+='<h2>All participants</h2><table><thead><tr><th>#</th><th>Rank</th><th>Name</th><th>Result</th></tr></thead><tbody>';
    entries.forEach(function(e){
      var isW=prevWinnerCids.indexOf(e.cid)>=0;
      win+='<tr class="'+(isW?'won':'')+'"><td>'+e.num+'</td><td>'+e.rank+'</td><td>'+e.name+'</td><td>'+(isW?'WINNER':'')+'</td></tr>';
    });
    win+='</tbody></table></body></html>';
    var blob=new Blob([win],{type:'text/html'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=(g.title||'giveaway').replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_')+'_report.html';
    document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
    flash('Report downloaded \u2014 open in browser and print to PDF');
  };

  const handleSpin=(g)=>{
    var entries=[];try{entries=JSON.parse(g.entries||'[]');}catch(e){}
    var repeats=g.allowRepeatWins==='true';
    var prevWinnerCids=(g.winnerCid||'').split(',').filter(Boolean);
    var eligible=repeats?entries:entries.filter(e=>prevWinnerCids.indexOf(e.cid)<0);
    if(eligible.length<2){flash('Need at least 2 eligible entries to spin');return;}
    setSpinGiveaway({...g,parsedEntries:eligible,allEntries:entries,numWinners:1});
  };

  const handleWinnerRecorded=async(g,winner)=>{
    await api(backendUrl,'recordWinner',{token:authToken,giveawayId:g.id,winner:winner});
    flash(winner.rank+' '+winner.name+' wins! Giveaway stays open.');
    setSpinGiveaway(null);loadGiveaways();
  };

  const handleCloseEvent=async(g)=>{
    if(!confirm('Close this giveaway? No more entries or spins allowed.'))return;
    await api(backendUrl,'closeGiveaway',{token:authToken,giveawayId:g.id,winners:[]});
    flash('Event closed');loadGiveaways();
  };



  if(spinGiveaway){

function SpinWheel({giveaway,onClose,onWinners,backendUrl,authToken}){
  const canvasRef=React.useRef(null);
  const confRef=React.useRef(null);
  const[spinning,setSpinning]=useState(false);
  const[winners,setWinners]=useState([]);
  const[activeNum,setActiveNum]=useState(-1);
  const[centerText,setCenterText]=useState({num:'#',name:''});
  const entries=giveaway.parsedEntries;
  const numWinners=giveaway.numWinners||1;
  const colors=['#C6973F','#185FA5','#993C1D','#0F6E56','#534AB7','#993556','#854F0B','#3B6D11','#A32D2D','#085041','#3C3489','#72243E'];
  const shuffleArr=(a)=>{var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;};
  const wheelOrderRef=React.useRef(shuffleArr(entries));
  const angleRef=React.useRef(0);
  const remainingRef=React.useRef(entries.slice());
  const winnersRef=React.useRef([]);

  const drawWheel=()=>{
    var cv=canvasRef.current;if(!cv)return;var ctx=cv.getContext('2d');
    var wo=wheelOrderRef.current,n=wo.length;if(n===0)return;
    var arc=Math.PI*2/n,a=angleRef.current;
    ctx.clearRect(0,0,600,600);
    for(var i=0;i<n;i++){var sa=a+i*arc;ctx.beginPath();ctx.moveTo(300,300);ctx.arc(300,300,280,sa,sa+arc);ctx.closePath();ctx.fillStyle=colors[(wo[i].num-1)%colors.length];ctx.fill();ctx.strokeStyle='#0B1A33';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.translate(300,300);ctx.rotate(sa+arc/2);ctx.fillStyle='#E8E8EC';ctx.font='500 '+(n>16?'18':'26')+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(wo[i].num,n>16?150:180,0);ctx.restore();}
  };

  const getCurrent=()=>{var wo=wheelOrderRef.current,n=wo.length;if(n===0)return null;var arc=Math.PI*2/n;var pa=(Math.PI*1.5-angleRef.current)%(Math.PI*2);if(pa<0)pa+=Math.PI*2;return wo[Math.floor(pa/arc)%n];};

  React.useEffect(()=>{drawWheel();},[]);

  const fireConf=()=>{
    var cv=confRef.current;if(!cv)return;cv.width=300;cv.height=300;var ctx=cv.getContext('2d');
    var ps=[];var cc=['#C6973F','#D4AD5E','#E8E8EC','#C0392B','#27AE60','#3498DB','#E67E22','#9B59B6'];
    for(var i=0;i<120;i++){ps.push({x:150,y:150,vx:(Math.random()-.5)*10,vy:(Math.random()-1)*8-2,w:Math.random()*7+3,h:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-.5)*12,color:cc[Math.floor(Math.random()*cc.length)],life:150+Math.random()*80,age:0});}
    var go=()=>{ctx.clearRect(0,0,300,300);var alive=false;ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.rot+=p.vr;p.age++;if(p.age>p.life)return;alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-p.age/p.life);ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});ctx.globalAlpha=1;if(alive)requestAnimationFrame(go);else ctx.clearRect(0,0,300,300);};
    go();setTimeout(()=>{for(var i=0;i<80;i++){ps.push({x:150,y:150,vx:(Math.random()-.5)*10,vy:(Math.random()-1)*8-2,w:Math.random()*7+3,h:Math.random()*4+2,rot:Math.random()*360,vr:(Math.random()-.5)*12,color:cc[Math.floor(Math.random()*cc.length)],life:150+Math.random()*80,age:0});}},800);
  };

  const doSpin=()=>{
    if(spinning)return;setSpinning(true);setActiveNum(-1);
    var rem=remainingRef.current;
    wheelOrderRef.current=shuffleArr(rem);
    angleRef.current=0;drawWheel();
    var lastNum=-1;
    var total=Math.PI*2*(15+Math.random()*6),dur=15000,start=performance.now();
    var ease=(t)=>{if(t<0.3)return t/0.3*0.5;var t2=(t-0.3)/0.7;return 0.5+0.5*(1-Math.pow(1-t2,5));};

    // Determine winner before spin starts so we can broadcast
    var finalAngle=total;
    var woFinal=wheelOrderRef.current,nf=woFinal.length,arcf=Math.PI*2/nf;
    var paf=(Math.PI*1.5-finalAngle)%(Math.PI*2);if(paf<0)paf+=Math.PI*2;
    var winIdx=Math.floor(paf/arcf)%nf;
    var spinWinner=woFinal[winIdx];

    // Broadcast to Pusher for live viewers
    if(backendUrl&&authToken){
      api(backendUrl,'triggerSpin',{token:authToken,giveawayId:giveaway.id,
        wheelOrder:woFinal.map(e=>({num:e.num,name:e.name,rank:e.rank})),
        winnerNum:spinWinner.num,giveawayTitle:giveaway.title,totalRotation:total
      });
    }

    var anim=(now)=>{var el=now-start,t=Math.min(el/dur,1);angleRef.current=ease(t)*total;drawWheel();
      var cur=getCurrent();
      if(cur&&cur.num!==lastNum){lastNum=cur.num;setCenterText({num:'#'+cur.num,name:cur.rank+' '+cur.name});setActiveNum(cur.num);}
      if(t<1){requestAnimationFrame(anim);}
      else{setSpinning(false);var w=getCurrent();
        winnersRef.current=[...winnersRef.current,w];setWinners([...winnersRef.current]);
        remainingRef.current=rem.filter(e=>e.cid!==w.cid);
        setCenterText({num:'#'+w.num,name:w.rank+' '+w.name});setActiveNum(w.num);
        fireConf();
      }
    };requestAnimationFrame(anim);
  };

  var allPicked=winners.length>=numWinners;

  return(<div className="confirm-overlay"><div className="panel" onClick={ev=>ev.stopPropagation()}>
    <div className="ph"><h2>{giveaway.title}</h2><button onClick={onClose}>{IC.x}</button></div>
    <div className="pb">

      {!allPicked&&<>
        <div style={{position:'relative',width:300,height:300,margin:'0 auto 8px'}}>
          <div style={{position:'absolute',top:-8,left:'50%',transform:'translateX(-50%)',width:0,height:0,borderLeft:'12px solid transparent',borderRight:'12px solid transparent',borderTop:'24px solid #C6973F',zIndex:2}}/>
          <canvas ref={canvasRef} width={600} height={600} style={{width:300,height:300}}/>
          <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:70,height:70,borderRadius:'50%',background:'#0B1A33',border:'3px solid #C6973F',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',zIndex:2,overflow:'hidden',padding:4}}>
            <div style={{fontSize:16,color:'var(--gold)',fontWeight:500}}>{centerText.num}</div>
            <div style={{fontSize:9,color:'var(--gold)',textAlign:'center',lineHeight:1.1,maxWidth:58,wordWrap:'break-word'}}>{centerText.name}</div>
          </div>
          <canvas ref={confRef} width={300} height={300} style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:10}}/>
        </div>
        <div style={{textAlign:'center'}}><button className="btn btn-gold" onClick={doSpin} disabled={spinning} style={{padding:'12px 40px',fontSize:15}}>{spinning?'Spinning...':'SPIN FOR WINNER '+(winners.length+1)}</button></div>
      </>}
      {allPicked&&<div style={{display:'flex',gap:8,justifyContent:'center',margin:'12px 0'}}>
        <button className="btn btn-gold" onClick={()=>onWinners(winners)} style={{padding:'12px 24px'}}>Confirm {winners.length>1?'Winners':'Winner'}</button>
        <button className="btn btn-outline" onClick={()=>{winnersRef.current=[];setWinners([]);remainingRef.current=entries.slice();wheelOrderRef.current=shuffleArr(entries);angleRef.current=0;setActiveNum(-1);setCenterText({num:'#',name:''});drawWheel();}} style={{padding:'12px 24px'}}>Start Over</button>
      </div>}
      <div style={{maxHeight:220,overflowY:'auto',textAlign:'left',fontSize:13,marginTop:12,border:'0.5px solid rgba(198,151,63,.2)',borderRadius:8}}>
        {entries.map((e,i)=>{var isW=winners.find(w=>w.cid===e.cid);var isActive=!isW&&activeNum===e.num;return <div key={i} id={'adm_pe_'+e.num} style={{padding:'8px 12px',borderBottom:'0.5px solid rgba(198,151,63,.1)',display:'flex',alignItems:'center',gap:10,color:isW?'var(--gold)':isActive?'var(--gold)':'var(--text-dim)',fontWeight:isW||isActive?500:400,background:isW?'rgba(198,151,63,.15)':isActive?'rgba(198,151,63,.08)':'transparent',opacity:isW?1:(winners.find(w=>w.cid===e.cid)?0.3:1),transition:'all .1s'}}><span style={{width:26,height:26,borderRadius:'50%',background:colors[(e.num-1)%colors.length],display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:500,color:'#E8E8EC',flexShrink:0}}>{e.num}</span>{e.rank} {e.name}{isW?' \u2014 WINNER!':''}</div>;})}
      </div>
    </div>
  </div></div>);
}

function AnnouncementsPanel({onClose,backendUrl,authToken,flash}){
  const[posts,setPosts]=useState([]);
  const[loading,setLoading]=useState(true);
  const[editId,setEditId]=useState(null);
  const[title,setTitle]=useState('');
  const[saving,setSaving]=useState(false);
  const[orderedItems,setOrderedItems]=useState([]);
  const[dragIdx,setDragIdx]=useState(null);
  const[videoUrl,setVideoUrl]=useState('');
  const[videoEnabled,setVideoEnabled]=useState(false);
  const bodyRef=React.useRef(null);

  const getBody=()=>bodyRef.current?bodyRef.current.innerHTML.trim():'';
  const setBodyHtml=(html)=>{if(bodyRef.current)bodyRef.current.innerHTML=html||'';};
  const execCmd=(cmd,val)=>{document.execCommand(cmd,false,val||null);if(bodyRef.current)bodyRef.current.focus();};

  const loadPosts=async()=>{
    setLoading(true);
    const res=await api(backendUrl,'getAnnouncements',{token:authToken});
    if(res.ok){
      const p=res.posts||[];
      setPosts(p);
      setVideoUrl(res.videoUrl||'');
      setVideoEnabled(res.videoEnabled||false);
      const ao=res.announcementOrder||[];
      const bday={type:'birthday',id:'BIRTHDAYS'};
      const video={type:'video',id:'VIDEO'};
      const postMap={};
      p.forEach(x=>{postMap[String(x.id)]={type:'post',id:String(x.id),data:x};});
      if(ao.length>0){
        // Build from saved order
        const built=[];
        ao.forEach(id=>{
          if(id==='BIRTHDAYS')built.push(bday);
          else if(id==='VIDEO')built.push(video);
          else if(postMap[id]){built.push(postMap[id]);delete postMap[id];}
        });
        // Add any posts not in saved order (newly created)
        Object.values(postMap).forEach(x=>built.push(x));
        // Ensure birthday and video exist
        if(!built.find(x=>x.id==='BIRTHDAYS'))built.unshift(bday);
        if(!built.find(x=>x.id==='VIDEO'))built.push(video);
        setOrderedItems(built);
      }else{
        // No saved order — default: birthday, video, then posts
        const items=[bday,video,...p.map(x=>({type:'post',id:String(x.id),data:x}))];
        setOrderedItems(items);
      }
    }
    setLoading(false);
  };
  React.useEffect(()=>{loadPosts();},[]);

  const handleSave=async()=>{
    const b=getBody();
    if(!title.trim()||!b||b==='<br>')return;
    setSaving(true);
    const payload={token:authToken,title:title.trim(),body:b};
    if(editId)payload.id=editId;
    const res=await api(backendUrl,'saveAnnouncement',payload);
    setSaving(false);
    if(res.ok){flash('Announcement '+(res.action||'saved'));setTitle('');setBodyHtml('');setEditId(null);loadPosts();}
    else{flash('Error: '+(res.error||'save failed'));}
  };
  const handleDelete=async(id)=>{
    if(!confirm('Delete this announcement?'))return;
    const res=await api(backendUrl,'deleteAnnouncement',{token:authToken,id});

  };

  const cancelEdit=()=>{setEditId(null);setTitle('');setBodyHtml('');};
  const insertLink=()=>{const url=prompt('Enter URL:','https://');if(url)execCmd('createLink',url);};

  const saveOrder=async(items,vUrl,vEnabled)=>{
    const order=items.map(i=>String(i.id));

    if(vEnabled!==undefined)payload.videoEnabled=vEnabled;
    await api(backendUrl,'saveAnnouncementOrder',payload);
    flash('Order saved');
  };

  const moveItem=(fromIdx,toIdx)=>{
    const items=[...orderedItems];

  return(<div className="confirm-overlay" onClick={onClose}><div className="panel" onClick={ev=>ev.stopPropagation()}>

          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('undo')} title="Undo">{"\u21a9"}</button>
          <button style={tbStyle} onMouseDown={e=>e.preventDefault()} onClick={()=>execCmd('redo')} title="Redo">{"\u21aa"}</button>

          <span style={sepStyle}/>
          <select style={selStyle} onChange={e=>{if(e.target.value)execCmd('fontSize',e.target.value);e.target.selectedIndex=0;}} defaultValue="" title="Font size">
            <option value="">Size</option><option value="1">Small</option><option value="3">Normal</option><option value="4">Medium</option><option value="5">Large</option><option value="6">X-Large</option><option value="7">Huge</option>
          </select>

          <span style={sepStyle}/>

             </div>
             <div style={{flex:1}}>
               <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                 <span style={{fontSize:16}}>{"\u25b6\ufe0f"}</span>
                 <span style={{fontSize:14,fontWeight:600,color:'#C0392B'}}>YouTube / Livestream</span>
                 <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
                   <span style={{fontSize:11,color:'var(--text-muted)'}}>{videoEnabled?'ON':'OFF'}</span>
